version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "../migrations/sql/"
    queries:
      - "db/queries/"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        # pgvector's `vector(N)` is unknown to sqlc out of the box.
        # Map every vector column to pgvector-go's `Vector` type so
        # generated code compiles + supports cosine ops via `<=>`.
        overrides:
          - db_type: "vector"
            go_type:
              import: "github.com/pgvector/pgvector-go"
              package: "pgvector"
              type: "Vector"
