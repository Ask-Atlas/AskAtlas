slug: cs161-graph-algorithms-quiz
study_guide_slug: cs161-graph-algorithms
title: "CS 161 — Graph Algorithms Quiz"
description: "Six questions covering BFS, DFS, shortest paths, and graph algorithm selection."
questions:
  - slug: q1
    type: multiple_choice
    text: "You need to find shortest paths in a directed graph that contains some negative-weight edges (but no negative cycles). Which algorithm should you use?"
    options:
      - { text: "BFS", correct: false }
      - { text: "Dijkstra", correct: false }
      - { text: "Bellman–Ford", correct: true }
      - { text: "Topological sort + relaxation", correct: false }
    feedback_correct: "Bellman–Ford handles negative edges and runs in $\\Theta(VE)$. Dijkstra fails on negative edges; BFS only handles unweighted graphs."
    feedback_incorrect: "Dijkstra requires non-negative edges. BFS only works for unweighted graphs. Bellman–Ford handles negative weights at $\\Theta(VE)$ cost."
  - slug: q2
    type: multiple_choice
    text: "What is the running time of BFS on a graph with $V$ vertices and $E$ edges (using an adjacency-list representation)?"
    options:
      - { text: "$\\Theta(V)$", correct: false }
      - { text: "$\\Theta(E)$", correct: false }
      - { text: "$\\Theta(V + E)$", correct: true }
      - { text: "$\\Theta(V \\cdot E)$", correct: false }
    feedback_correct: "BFS visits each vertex once ($\\Theta(V)$) and traverses each edge once ($\\Theta(E)$), giving $\\Theta(V + E)$ total."
    feedback_incorrect: "BFS visits each vertex once and traverses each edge once. Total: $\\Theta(V + E)$."
  - slug: q3
    type: true_false
    text: "Dijkstra's algorithm is correct on graphs with negative edge weights as long as there are no negative cycles."
    options:
      - { text: "True", correct: false }
      - { text: "False", correct: true }
    feedback_correct: "Dijkstra's correctness invariant — that the popped vertex's distance is final — fails when negative edges allow later improvements."
    feedback_incorrect: "Dijkstra silently produces wrong answers on negative edges, even without negative cycles. Use Bellman–Ford for negative weights."
  - slug: q4
    type: multiple_choice
    text: "Topological sort is defined for which class of graphs?"
    options:
      - { text: "Any directed graph", correct: false }
      - { text: "Directed acyclic graphs (DAGs)", correct: true }
      - { text: "Undirected graphs only", correct: false }
      - { text: "Trees only", correct: false }
    feedback_correct: "A topological order requires every edge $(u,v)$ to have $u$ before $v$. This is impossible if a cycle exists."
    feedback_incorrect: "If there's a cycle $a \\to b \\to a$, no linear ordering can place both before the other. So we need a DAG."
  - slug: q5
    type: true_false
    text: "Floyd–Warshall solves the all-pairs shortest paths problem in $\\Theta(V^3)$ regardless of edge density."
    options:
      - { text: "True", correct: true }
      - { text: "False", correct: false }
    feedback_correct: "Floyd–Warshall has three nested loops over all vertices, giving $\\Theta(V^3)$ regardless of $E$."
    feedback_incorrect: "Floyd–Warshall runs three nested loops over $V$, giving $\\Theta(V^3)$ — independent of $E$. Sparse graphs may benefit from Johnson's algorithm instead."
  - slug: q6
    type: freeform
    text: "Explain why Dijkstra's algorithm can return an incorrect answer if the input graph contains a negative edge (even without a negative cycle). Give a small concrete example."
    reference_answer: |
      Dijkstra's correctness rests on the invariant: when a vertex $u$ is removed from the priority queue, $\text{dist}[u]$ is final. The argument assumes that no future relaxation can improve $\text{dist}[u]$, which requires all edges to be non-negative.

      Concrete counterexample: vertices $\{s, a, b\}$, edges $s \to a$ weight 1, $s \to b$ weight 4, $a \to b$ weight $-3$.

      Dijkstra starting from $s$:
      - Pop $s$ (dist 0). Relax: $\text{dist}[a] = 1$, $\text{dist}[b] = 4$.
      - Pop $a$ (dist 1, smaller than $b$'s 4). Relax: $\text{dist}[b] = \min(4, 1 + (-3)) = -2$.
      - Pop $b$ with dist $-2$. But Dijkstra already finalized $a$'s distance as 1.

      In this small example, $a$'s distance happens to still be correct. The danger is in larger graphs where a negative edge can backtrack into a previously finalized vertex and reduce its distance — Dijkstra has already moved on and will not revisit, producing wrong answers downstream.
