slug: cs106a-python-intro-quiz
study_guide_slug: cs106a-python-intro
title: "CS 106A — Python Intro Quiz"
description: "6 questions on values, types, operators, and the Python REPL."
questions:
  - slug: q1
    type: multiple_choice
    text: "What is the value of `7 / 2` in Python 3?"
    hint: "Python 3 distinguishes true division from floor division."
    feedback_correct: "Right — `/` is true division and always returns a float."
    feedback_incorrect: "`/` is true division in Python 3. Use `//` for floor division."
    options:
      - { text: "3", correct: false }
      - { text: "3.5", correct: true }
      - { text: "3.0", correct: false }
      - { text: "TypeError", correct: false }

  - slug: q2
    type: multiple_choice
    text: "Which of the following is a `TypeError` at runtime?"
    feedback_correct: "Correct — Python won't implicitly convert between str and int."
    feedback_incorrect: "Mixing types like `\"hello\" + 1` is a TypeError; the others all work."
    options:
      - { text: "`\"hello\" + 1`", correct: true }
      - { text: "`\"hello\" * 3`", correct: false }
      - { text: "`3 * 2.0`", correct: false }
      - { text: "`True + 1`", correct: false }

  - slug: q3
    type: multiple_choice
    text: "What does `2 ** 10` evaluate to?"
    hint: "`**` is exponentiation, not XOR."
    feedback_correct: "Right — `**` is the exponentiation operator."
    feedback_incorrect: "`**` is exponentiation. `^` is bitwise XOR (which would give 8)."
    options:
      - { text: "20", correct: false }
      - { text: "1024", correct: true }
      - { text: "8", correct: false }
      - { text: "100", correct: false }

  - slug: q4
    type: multiple_choice
    text: "Which value is FALSY in a boolean context?"
    feedback_correct: "Correct — empty containers and 0 are falsy."
    feedback_incorrect: "Empty list, empty string, 0, and None are the falsy values you'll meet in CS 106A."
    options:
      - { text: "`\"False\"`", correct: false }
      - { text: "`[]`", correct: true }
      - { text: "`[0]`", correct: false }
      - { text: "`\" \"`", correct: false }

  - slug: q5
    type: true_false
    text: "`input(\"x: \")` always returns a string, even when the user types a number."
    feedback_correct: "True — convert with `int(...)` or `float(...)` if you need a number."
    feedback_incorrect: "It IS True. `input` always gives back a `str`; that's why we wrap with `int(...)`."
    options:
      - { text: "True", correct: true }
      - { text: "False", correct: false }

  - slug: q6
    type: freeform
    text: "Briefly explain why `int(input(\"n: \"))` raises `ValueError` when the user types `five`."
    reference_answer: |
      `input` returns the literal string `"five"`. `int(...)` only succeeds on
      strings that look like a number ("0", "-3", "42"). Words like "five"
      have no integer representation, so `int` raises `ValueError`. The fix
      is either to ask the user for a digit, or to wrap the conversion in a
      `try`/`except ValueError`.
