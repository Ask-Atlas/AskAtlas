slug: math171-related-rates-quiz
study_guide_slug: math171-related-rates
title: "MATH 171 — Related Rates Quiz"
description: "6 questions on the four-step recipe and classic related-rates setups."
questions:
  - slug: q1
    type: multiple_choice
    text: "A 10-ft ladder leans against a wall. The bottom slides away from the wall at $1$ ft/s. When the bottom is $6$ ft from the wall, how fast is the top sliding down?"
    hint: "Use $x^2 + y^2 = 100$ and differentiate with respect to $t$."
    feedback_correct: "Right — at $x = 6$, $y = 8$, so $dy/dt = -(6/8)(1) = -3/4$ ft/s."
    feedback_incorrect: "Differentiate $x^2 + y^2 = 100$ implicitly: $2x \\, dx/dt + 2y \\, dy/dt = 0$. Solve for $dy/dt$ and plug in $x = 6, y = 8, dx/dt = 1$."
    options:
      - { text: "$-3/4$ ft/s", correct: true }
      - { text: "$-4/3$ ft/s", correct: false }
      - { text: "$-1$ ft/s", correct: false }
      - { text: "$-6/8$ ft/s (not simplified)", correct: false }

  - slug: q2
    type: multiple_choice
    text: "A spherical balloon is inflated at $20$ cm$^3$/s. How fast is the radius growing when $r = 5$ cm?"
    hint: "$V = (4/3) \\pi r^3$. Differentiate with respect to $t$."
    feedback_correct: "Yes — $dV/dt = 4\\pi r^2 \\, dr/dt$, so $dr/dt = 20 / (4\\pi \\cdot 25) = 1/(5\\pi)$ cm/s."
    feedback_incorrect: "Use $dV/dt = 4\\pi r^2 \\, dr/dt$ and solve for $dr/dt$ at $r = 5$."
    options:
      - { text: "$\\dfrac{1}{5\\pi}$ cm/s", correct: true }
      - { text: "$\\dfrac{1}{\\pi}$ cm/s", correct: false }
      - { text: "$\\dfrac{4}{5}$ cm/s", correct: false }
      - { text: "$5\\pi$ cm/s", correct: false }

  - slug: q3
    type: true_false
    text: "When solving a related-rates problem, you should plug in the instantaneous values BEFORE differentiating."
    feedback_correct: "Correct — substituting first turns the variables into constants, whose derivatives are zero."
    feedback_incorrect: "Substituting first collapses the variables into constants. Always differentiate first, plug in second."
    options:
      - { text: "True", correct: false }
      - { text: "False", correct: true }

  - slug: q4
    type: true_false
    text: "If a quantity is decreasing in time, its rate $dQ/dt$ should be entered as a negative number."
    feedback_correct: "Yes — sign of the rate encodes the direction of change."
    feedback_incorrect: "It is true: a decreasing quantity has a negative time derivative."
    options:
      - { text: "True", correct: true }
      - { text: "False", correct: false }

  - slug: q5
    type: multiple_choice
    text: "What is the FIRST step of the four-step recipe for related-rates problems?"
    hint: "Before any equations, what should be on the page?"
    feedback_correct: "Right — drawing and labelling forces you to identify the variables clearly."
    feedback_incorrect: "Step 1 is to draw a picture and label every variable. Equations come after."
    options:
      - { text: "Differentiate with respect to $t$", correct: false }
      - { text: "Plug in the instantaneous values", correct: false }
      - { text: "Draw a picture and label every quantity that varies", correct: true }
      - { text: "Solve for the requested rate", correct: false }

  - slug: q6
    type: freeform
    text: "Water drains from an inverted cone (radius 3 m, height 6 m) at $2$ m$^3$/min. How fast is the water level dropping when the depth is $4$ m? Show the setup and final answer with units."
    reference_answer: |
      By similar triangles, $r/h = 3/6$ so $r = h/2$. Volume of water:
      $V = \tfrac{1}{3}\pi r^2 h = \tfrac{\pi}{12} h^3$.
      Differentiate w.r.t. $t$: $\frac{dV}{dt} = \tfrac{\pi}{4} h^2 \frac{dh}{dt}$.
      Plug in $dV/dt = -2$ (volume decreasing) and $h = 4$:
      $-2 = \tfrac{\pi}{4}(16) \frac{dh}{dt} = 4\pi \frac{dh}{dt}$,
      so $\frac{dh}{dt} = -\dfrac{1}{2\pi}$ m/min.
      The negative sign confirms the depth is decreasing.
