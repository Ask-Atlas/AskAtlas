    MembershipCheckResponse:
      type: object
      description: |
        Per-section membership status for the authenticated user. `enrolled`
        is always present; `role` and `joined_at` are non-null only when
        `enrolled` is true. Both nullable fields are emitted as JSON null
        (not omitted) so the frontend can safely destructure.
      properties:
        enrolled:
          type: boolean
        role:
          type: string
          nullable: true
          enum:
            - student
            - ta
            - instructor
        joined_at:
          type: string
          format: date-time
          nullable: true
      required:
        - enrolled
        - role
        - joined_at
    CreateQuizMCQOption:
      type: object
      description: |
        A single option for a `multiple-choice` question on the create
        request. Exactly one option per MCQ question must have
        `is_correct: true`. The text is rendered to the student
        verbatim; no normalization is applied server-side.
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 500
        is_correct:
          type: boolean
      required:
        - text
        - is_correct
    CreateQuizQuestion:
      type: object
      description: |
        A single question on the create-quiz request. The `type` field
        discriminates which other fields are meaningful:
          * `multiple-choice` -- requires `options`; ignores
            `correct_answer`.
          * `true-false` -- requires `correct_answer` as a boolean;
            ignores `options`.
          * `freeform` -- requires `correct_answer` as a non-empty
            string; ignores `options`.
        Cross-field validation is enforced by the service layer with
        per-field 400 error details when the rules above are violated.
      properties:
        type:
          type: string
          enum:
            - multiple-choice
            - true-false
            - freeform
        question:
          type: string
          minLength: 1
          maxLength: 2000
        options:
          type: array
          minItems: 2
          maxItems: 10
          items:
            $ref: '#/components/schemas/CreateQuizMCQOption'
        correct_answer:
          description: |
            For `true-false` questions this is a boolean; for `freeform`
            questions this is a non-empty string (max 500 chars).
            Ignored for `multiple-choice` questions (correctness is
            embedded in `options[].is_correct`).
          nullable: true
        hint:
          type: string
          nullable: true
          maxLength: 1000
        feedback_correct:
          type: string
          nullable: true
          maxLength: 1000
        feedback_incorrect:
          type: string
          nullable: true
          maxLength: 1000
        sort_order:
          type: integer
          minimum: 0
      required:
        - type
        - question
    CreateQuizRequest:
      type: object
      description: |
        Request body for POST /api/study-guides/{study_guide_id}/quizzes.
        The entire quiz (title + N questions + each question's options)
        is created atomically. If any question fails validation, the
        whole request is rejected and no rows are written.

        `creator_id` is set from the JWT; any value supplied here is
        ignored (sending one is not an error to keep the wire shape
        forgiving for frontend builders).
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
          nullable: true
          maxLength: 2000
        questions:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/CreateQuizQuestion'
      required:
        - title
        - questions
    QuizQuestionResponse:
      type: object
      description: |
        A single question on the quiz detail response. The `options`
        array is present only on `multiple-choice` questions and lists
        the option text in display order. `correct_answer` is the
        text of the correct option for MCQ, the boolean for true-false,
        and the reference answer string for freeform.
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - multiple-choice
            - true-false
            - freeform
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correct_answer:
          description: |
            The correct answer for this question. String for
            multiple-choice (the winning option's text) and freeform
            (the reference answer); boolean for true-false.
          nullable: true
        hint:
          type: string
          nullable: true
        feedback:
          type: object
          properties:
            correct:
              type: string
              nullable: true
            incorrect:
              type: string
              nullable: true
          required:
            - correct
            - incorrect
        sort_order:
          type: integer
      required:
        - id
        - type
        - question
        - hint
        - feedback
        - sort_order
    QuizDetailResponse:
      type: object
      description: |
        Full quiz payload returned by POST /api/study-guides/{id}/quizzes,
        GET /api/quizzes/{quiz_id}, and PATCH /api/quizzes/{quiz_id}.
        Includes the embedded study guide id, the creator (privacy
        floor: id + first_name + last_name only), and every question
        with its options and correct answer.
      properties:
        id:
          type: string
          format: uuid
        study_guide_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        creator:
          $ref: '#/components/schemas/CreatorSummary'
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuizQuestionResponse'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - study_guide_id
        - title
        - description
        - creator
        - questions
        - created_at
        - updated_at
    QuizListItemResponse:
      type: object
      description: |
        Compact quiz payload returned by GET /api/study-guides/{id}/quizzes.
        Richer than QuizSummary (which embeds inside StudyGuideDetailResponse
        and intentionally stays minimal): includes the creator (privacy
        floor: id + first_name + last_name only), description, and
        timestamps so the practice page can render the quiz card without
        a follow-up GET on the quiz detail.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        question_count:
          type: integer
          format: int64
          minimum: 0
        creator:
          $ref: '#/components/schemas/CreatorSummary'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - question_count
        - creator
        - created_at
        - updated_at
    ListQuizzesResponse:
      type: object
      description: |
        A non-paginated collection of quizzes for one study guide. The
        spec deliberately omits pagination -- guides typically host
        fewer than ten quizzes and the practice page renders them all
        in one shot.
      properties:
        quizzes:
          type: array
          items:
            $ref: '#/components/schemas/QuizListItemResponse'
      required:
        - quizzes
    UpdateQuizRequest:
      type: object
      description: |
        Request body for PATCH /api/quizzes/{quiz_id}. Both fields
        are optional; absent fields preserve their current value.
        At least one field must be provided -- an empty body `{}`
        is rejected with 400.

        `description` supports an explicit JSON `null` to clear the
        existing value (the only field on this endpoint with that
        semantic; `title` cannot be cleared because the column is
        NOT NULL on the underlying schema).
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
          nullable: true
          maxLength: 2000
    SessionSummaryResponse:
      type: object
      description: |
        A compact session summary returned in
        GET /api/quizzes/{quiz_id}/sessions (ASK-149) listings.
        Distinct from SessionDetailResponse: there is no `answers`
        array (callers fetch it via GET /api/sessions/{id}) and no
        `quiz_id` (the listing is already scoped to a quiz).

        `score_percentage` is `null` while the session is in-progress
        (`completed_at` is null too) and an integer 0-100 once the
        session is completed -- same gating rule as
        SessionDetailResponse.
      properties:
        id:
          type: string
          format: uuid
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        total_questions:
          type: integer
          minimum: 0
        correct_answers:
          type: integer
          minimum: 0
        score_percentage:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
      required:
        - id
        - started_at
        - completed_at
        - total_questions
        - correct_answers
        - score_percentage
    ListSessionsResponse:
      type: object
      description: |
        A paginated list of the authenticated user's practice
        sessions for a quiz (ASK-149). `next_cursor` is null on the
        last page (always present on the wire -- the field is
        required + nullable so codegen renders explicit `null`
        instead of dropping the key); `has_more` is the explicit
        boolean for client-side page-end detection so callers don't
        have to inspect the cursor field.
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionSummaryResponse'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
      required:
        - sessions
        - has_more
        - next_cursor
    SessionDetailResponse:
      type: object
      description: |
        Returned by GET /api/sessions/{session_id} (ASK-152). The
        response shape is the union of PracticeSessionResponse +
        a nullable score_percentage:
          * `score_percentage` is null while the session is
            in-progress (`completed_at` is null too) and an integer
            0-100 once the session is completed.
          * `answers` is identical to the PracticeSessionResponse
            field -- chronological list of submitted answers,
            with nullable question_id for answers whose underlying
            question was hard-deleted (ON DELETE SET NULL).
          * `completed_at` is nullable -- distinguishes in-progress
            from completed sessions on the wire.
      properties:
        id:
          type: string
          format: uuid
        quiz_id:
          type: string
          format: uuid
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        total_questions:
          type: integer
          minimum: 0
        correct_answers:
          type: integer
          minimum: 0
        score_percentage:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
        answers:
          type: array
          items:
            $ref: '#/components/schemas/PracticeAnswerResponse'
      required:
        - id
        - quiz_id
        - started_at
        - completed_at
        - total_questions
        - correct_answers
        - score_percentage
        - answers
    CompletedSessionResponse:
      type: object
      description: |
        Returned by POST /api/sessions/{session_id}/complete
        (ASK-140). Same shape as PracticeSessionResponse minus the
        `answers` array (callers fetch them separately via
        GET /api/sessions/{id}) and plus the server-computed
        `score_percentage` field.

        `completed_at` is non-nullable here -- a successful response
        always carries the freshly-set timestamp from the
        completion UPDATE.

        `score_percentage` is `round((correct_answers /
        total_questions) * 100)`, rounded to the nearest integer.
        Always 0 when `total_questions` is 0 (avoids
        division-by-zero on the theoretically unreachable
        empty-quiz edge case).
      properties:
        id:
          type: string
          format: uuid
        quiz_id:
          type: string
          format: uuid
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        total_questions:
          type: integer
          minimum: 0
        correct_answers:
          type: integer
          minimum: 0
        score_percentage:
          type: integer
          minimum: 0
          maximum: 100
      required:
        - id
        - quiz_id
        - started_at
        - completed_at
        - total_questions
        - correct_answers
        - score_percentage
    SubmitAnswerRequest:
      type: object
      description: |
        Request body for POST /api/sessions/{session_id}/answers
        (ASK-137). The client supplies only the question being
        answered and the raw user input -- the backend is the sole
        source of truth for `is_correct` and `verified` on the
        response. Any extra fields a client sends (including
        attempts to forge `is_correct` or `verified`) are silently
        dropped by the Go JSON decoder because the
        SubmitAnswerRequest struct has no fields for them; the
        scoring path inside the service ignores client input
        entirely on those two fields, so a forged value cannot
        flow into the persisted row.

        Per-type expectations on `user_answer`:
          * `multiple-choice` -- the exact text of the chosen
            option (e.g. `"Sorted ascending"`). Comparison is
            byte-exact against the option's stored text.
          * `true-false` -- the lowercase string `"true"` or
            `"false"`. Anything else is a 400.
          * `freeform` -- the user's free-text response. Compared
            case-insensitively against the reference answer
            after trimming whitespace.
      properties:
        question_id:
          type: string
          format: uuid
        user_answer:
          type: string
          minLength: 1
      required:
        - question_id
        - user_answer
    PracticeAnswerResponse:
      type: object
      description: |
        A single answer submitted within a practice session.
        `question_id`, `user_answer`, and `is_correct` are nullable:
          * `question_id` becomes NULL when the underlying quiz
            question is hard-deleted after the answer was submitted
            (ON DELETE SET NULL on `practice_answers.question_id`).
          * `user_answer` and `is_correct` track the schema's
            nullable columns; in practice, the submit-answer
            endpoint always writes non-null values.
        `verified` is true for server-validated answer types
        (multiple-choice, true-false) and false for freeform answers
        (string-match only).
      properties:
        question_id:
          type: string
          format: uuid
          nullable: true
        user_answer:
          type: string
          nullable: true
        is_correct:
          type: boolean
          nullable: true
        verified:
          type: boolean
        answered_at:
          type: string
          format: date-time
      required:
        - question_id
        - user_answer
        - is_correct
        - verified
        - answered_at
    PracticeSessionResponse:
      type: object
      description: |
        A practice session row plus the answers submitted so far.
        Returned by POST /api/quizzes/{quiz_id}/sessions on both the
        201 (created) and 200 (resumed) paths -- the wire shape is
        identical, the status code distinguishes the two paths.

        `total_questions` is frozen at session-start time from the
        snapshot count (COUNT of `practice_session_questions` rows).
        Subsequent edits to the parent quiz do not change it.
        `correct_answers` is the running count of submitted answers
        with `is_correct = true`; the submit-answer endpoint
        increments it.

        On a freshly-created session, `answers` is an empty array
        (not null). On a resumed session, `answers` carries every
        row submitted so far, ordered by `answered_at ASC`.
      properties:
        id:
          type: string
          format: uuid
        quiz_id:
          type: string
          format: uuid
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        total_questions:
          type: integer
          minimum: 0
        correct_answers:
          type: integer
          minimum: 0
        answers:
          type: array
          items:
            $ref: '#/components/schemas/PracticeAnswerResponse'
      required:
        - id
        - quiz_id
        - started_at
        - completed_at
        - total_questions
        - correct_answers
        - answers
    DashboardCourseSummary:
      type: object
      description: |
        Compact course payload embedded in the dashboard's courses
        section. Includes the viewer's role + the section term so
        the home page can render "CPTS 322 (Spring 2026, student)"
        without follow-up requests.
      properties:
        id:
          type: string
          format: uuid
        department:
          type: string
        number:
          type: string
        title:
          type: string
        role:
          type: string
          enum:
            - student
            - ta
            - instructor
        section_term:
          type: string
      required:
        - id
        - department
        - number
        - title
        - role
        - section_term
    DashboardCoursesSection:
      type: object
      description: |
        Enrollment summary block. `current_term` is null when the
        viewer has no enrollments. `enrolled_count` is the number
        of courses the viewer is enrolled in for the resolved
        current term (NOT the lifetime enrollment total). `courses`
        is capped at 10.
      properties:
        enrolled_count:
          type: integer
          format: int32
        current_term:
          type: string
          nullable: true
        courses:
          type: array
          items:
            $ref: '#/components/schemas/DashboardCourseSummary'
      required:
        - enrolled_count
        - current_term
        - courses
    DashboardStudyGuideSummary:
      type: object
      description: |
        Compact study-guide payload embedded in the dashboard's
        study_guides section. `course_department` + `course_number`
        let the home page render a "CPTS 322 -- <title>" label.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        course_department:
          type: string
        course_number:
          type: string
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - title
        - course_department
        - course_number
        - updated_at
    DashboardStudyGuidesSection:
      type: object
      description: |
        Study-guide summary block. `created_count` excludes
        soft-deleted guides. `recent` is the 5 most recently
        updated guides the viewer created.
      properties:
        created_count:
          type: integer
          format: int32
        recent:
          type: array
          items:
            $ref: '#/components/schemas/DashboardStudyGuideSummary'
      required:
        - created_count
        - recent
    DashboardSessionSummary:
      type: object
      description: |
        Compact practice-session payload embedded in the dashboard's
        practice.recent_sessions array. `score_percentage` is the
        rounded per-session accuracy (0..100); `quiz_title` and
        `study_guide_title` are de-normalized from the session's
        quiz so the home page renders without follow-up GETs.
      properties:
        id:
          type: string
          format: uuid
        quiz_title:
          type: string
        study_guide_title:
          type: string
        score_percentage:
          type: integer
          format: int32
        completed_at:
          type: string
          format: date-time
      required:
        - id
        - quiz_title
        - study_guide_title
        - score_percentage
        - completed_at
    DashboardPracticeSection:
      type: object
      description: |
        Practice stats block. `sessions_completed` counts only
        sessions where `completed_at IS NOT NULL`.
        `total_questions_answered` is the sum of submitted answers
        across all completed sessions (from practice_answers, not
        the snapshot total on practice_sessions). `overall_accuracy`
        is the rounded percentage of correct/total across completed
        sessions; 0 when no sessions are completed (NULLIF prevents
        division by zero). `recent_sessions` is the 5 most recently
        completed sessions.
      properties:
        sessions_completed:
          type: integer
          format: int32
        total_questions_answered:
          type: integer
          format: int32
        overall_accuracy:
          type: integer
          format: int32
        recent_sessions:
          type: array
          items:
            $ref: '#/components/schemas/DashboardSessionSummary'
      required:
        - sessions_completed
        - total_questions_answered
        - overall_accuracy
        - recent_sessions
    DashboardFileSummary:
      type: object
      description: |
        Compact file payload embedded in the dashboard's
        files.recent array.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        mime_type:
          type: string
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - mime_type
        - updated_at
    DashboardFilesSection:
      type: object
      description: |
        File totals block. `total_count` and `total_size` exclude
        files in any deletion lifecycle and only count files with
        upload_status='complete'. `total_size` is bytes (int64).
        `recent` is the 5 most recently updated complete files.
      properties:
        total_count:
          type: integer
          format: int32
        total_size:
          type: integer
          format: int64
        recent:
          type: array
          items:
            $ref: '#/components/schemas/DashboardFileSummary'
      required:
        - total_count
        - total_size
        - recent
    DashboardResponse:
      type: object
      description: |
        Response envelope for GET /api/me/dashboard. All four
        sections are always present (never null) so the frontend
        can render the home page from a single response. Each
        section's count fields are 0 and list fields are [] when
        the viewer has no data in that area.
      properties:
        courses:
          $ref: '#/components/schemas/DashboardCoursesSection'
        study_guides:
          $ref: '#/components/schemas/DashboardStudyGuidesSection'
        practice:
          $ref: '#/components/schemas/DashboardPracticeSection'
        files:
          $ref: '#/components/schemas/DashboardFilesSection'
      required:
        - courses
        - study_guides
        - practice
        - files
    FavoriteFileSummary:
      type: object
      description: |
        Compact file payload embedded in a FavoriteItem when
        `entity_type=file`. Same fields as RecentFileSummary -- a
        separate schema so the favorites and recents endpoints can
        evolve independently without one accidentally bloating the
        other.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        mime_type:
          type: string
      required:
        - id
        - name
        - mime_type
    FavoriteStudyGuideSummary:
      type: object
      description: |
        Compact study-guide payload embedded in a FavoriteItem when
        `entity_type=study_guide`. Includes the parent course's
        department + number so the sidebar can render a
        "CPTS 322 -- <title>" label without a follow-up request.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        course_department:
          type: string
        course_number:
          type: string
      required:
        - id
        - title
        - course_department
        - course_number
    FavoriteCourseSummary:
      type: object
      description: |
        Compact course payload embedded in a FavoriteItem when
        `entity_type=course`. Mirrors the (department, number, title)
        triple used elsewhere in the API.
      properties:
        id:
          type: string
          format: uuid
        department:
          type: string
        number:
          type: string
        title:
          type: string
      required:
        - id
        - department
        - number
        - title
    FavoriteItem:
      type: object
      description: |
        A single favorited item. Exactly one of `file`, `study_guide`,
        or `course` is populated; the other two fields are absent
        (not null) and `entity_type` declares which one. `entity_id`
        mirrors the populated summary's `id` so callers can route
        purely off the envelope without unpacking the per-type
        payload.
      properties:
        entity_type:
          type: string
          enum:
            - file
            - study_guide
            - course
        entity_id:
          type: string
          format: uuid
        favorited_at:
          type: string
          format: date-time
        file:
          $ref: '#/components/schemas/FavoriteFileSummary'
        study_guide:
          $ref: '#/components/schemas/FavoriteStudyGuideSummary'
        course:
          $ref: '#/components/schemas/FavoriteCourseSummary'
      required:
        - entity_type
        - entity_id
        - favorited_at
    ListFavoritesResponse:
      type: object
      description: |
        Response envelope for GET /api/me/favorites. `favorites` is
        always an array (empty when the user has none).
        `next_cursor` is required and nullable so it renders as
        explicit JSON null on the last page (the frontend can
        check `=== null` instead of `=== undefined`).
      properties:
        favorites:
          type: array
          items:
            $ref: '#/components/schemas/FavoriteItem'
        has_more:
          type: boolean
        next_cursor:
          type: string
          nullable: true
      required:
        - favorites
        - has_more
        - next_cursor
    ToggleFavoriteResponse:
      type: object
      description: |
        Result of POST /api/files/{file_id}/favorite (ASK-130),
        POST /api/me/study-guides/{study_guide_id}/favorite (ASK-156),
        and POST /api/me/courses/{course_id}/favorite (ASK-157).
        `favorited` reflects the resulting state -- true when the
        toggle inserted a row, false when it deleted one.
        `favorited_at` is the row timestamp when favorited=true and
        explicit JSON null when favorited=false (so the frontend can
        check `=== null` rather than `=== undefined`).
      properties:
        favorited:
          type: boolean
          description: True if the entity is now favorited, false if just unfavorited.
        favorited_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the favorite row was created. Null when unfavorited.
      required:
        - favorited
        - favorited_at
    RecentFileSummary:
      type: object
      description: |
        Compact file payload embedded in a RecentItem when
        `entity_type=file`. Only the fields the sidebar needs to render
        a row label and an icon — full file metadata lives at
        GET /api/files/{file_id}.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        mime_type:
          type: string
      required:
        - id
        - name
        - mime_type
    RecentStudyGuideSummary:
      type: object
      description: |
        Compact study-guide payload embedded in a RecentItem when
        `entity_type=study_guide`. Includes the parent course's
        department + number so the sidebar can render
        "CPTS 322 -- Binary Trees Cheat Sheet" without a follow-up
        request.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        course_department:
          type: string
        course_number:
          type: string
      required:
        - id
        - title
        - course_department
        - course_number
    RecentCourseSummary:
      type: object
      description: |
        Compact course payload embedded in a RecentItem when
        `entity_type=course`. Mirrors the (department, number, title)
        triple used elsewhere in the API.
      properties:
        id:
          type: string
          format: uuid
        department:
          type: string
        number:
          type: string
        title:
          type: string
      required:
        - id
        - department
        - number
        - title
    RecentItem:
      type: object
      description: |
        A single recent item. Exactly one of `file`, `study_guide`, or
        `course` is populated; the other two fields are absent (not
        null) and `entity_type` declares which one. `entity_id` mirrors
        the populated summary's `id` so callers can route purely off
        the envelope without unpacking the per-type payload.
      properties:
        entity_type:
          type: string
          enum:
            - file
            - study_guide
            - course
        entity_id:
          type: string
          format: uuid
        viewed_at:
          type: string
          format: date-time
        file:
          $ref: '#/components/schemas/RecentFileSummary'
        study_guide:
          $ref: '#/components/schemas/RecentStudyGuideSummary'
        course:
          $ref: '#/components/schemas/RecentCourseSummary'
      required:
        - entity_type
        - entity_id
        - viewed_at
    ListRecentsResponse:
      type: object
      description: |
        Response envelope for GET /api/me/recents. `recents` is always
        an array (empty when the user has no view history). A struct
        wrapper rather than a bare array so future additions (an
        echoed `limit`, an aggregate `total_view_count`) can land
        backwards-compatibly.
      properties:
        recents:
          type: array
          items:
            $ref: '#/components/schemas/RecentItem'
      required:
        - recents
    AppError:
      type: object
      description: Standardized error response structure matching application error domains
      properties:
        code:
          type: integer
        status:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties:
            type: string
      required:
        - code
        - status
        - message
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    Conflict:
      description: Conflict with current resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
