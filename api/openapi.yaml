          nullable: true
          enum:
            - up
            - down
        view_count:
          type: integer
          format: int64
          minimum: 0
        is_recommended:
          type: boolean
        recommended_by:
          type: array
          items:
            $ref: '#/components/schemas/CreatorSummary'
        quizzes:
          type: array
          items:
