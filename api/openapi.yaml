openapi: 3.0.3
info:
  title: AskAtlas API
  version: 1.0.0
servers:
  - url: /api
security:
  - BearerAuth: []
paths:
  /me/files:
    get:
      operationId: ListFiles
      summary: List files for the current user
      parameters:
        - name: scope
          in: query
          description: Filter files by ownership or access level
          schema:
            type: string
            enum: [owned, course, study_guide, accessible]
            default: owned
        - name: status
          in: query
          description: Filter files by processing status
          schema:
            type: string
            enum: [pending, complete, failed]
            default: complete
        - name: mime_type
          in: query
          description: Filter by precise document mime-type classification
          schema:
            type: string
            enum:
              - "image/jpeg"
              - "image/png"
              - "image/webp"
              - "application/pdf"
              - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
              - "application/vnd.openxmlformats-officedocument.presentationml.presentation"
              - "text/plain"
              - "application/epub+zip"
        - name: min_size
          in: query
          description: Minimum file size in bytes
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: max_size
          in: query
          description: Maximum file size in bytes
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: created_from
          in: query
          description: Filter for files created on or after this UTC timestamp
          schema:
            type: string
            format: date-time
        - name: created_to
          in: query
          description: Filter for files created on or before this UTC timestamp
          schema:
            type: string
            format: date-time
        - name: updated_from
          in: query
          description: Filter for files updated on or after this UTC timestamp
          schema:
            type: string
            format: date-time
        - name: updated_to
          in: query
          description: Filter for files updated on or before this UTC timestamp
          schema:
            type: string
            format: date-time
        - name: q
          in: query
          description: Search term to partially match against file names
          schema:
            type: string
        - name: sort_by
          in: query
          description: Database column to sort the results by
          schema:
            type: string
            enum: [updated_at, created_at, name, size, status, mime_type]
            default: updated_at
        - name: sort_dir
          in: query
          description: Sorting direction (ascending or descending)
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: page_limit
          in: query
          description: Maximum number of files to return per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: cursor
          in: query
          description: Opaque pagination cursor token obtained from the previous response
          schema:
            type: string
      responses:
        '200':
          description: A list of files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFilesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /files:
    post:
      operationId: CreateFile
      summary: Create a file reference and get a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFileRequest'
      responses:
        '201':
          description: File reference created with presigned upload URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /files/{file_id}:
    get:
      operationId: GetFile
      summary: Get a file by ID
      parameters:
        - name: file_id
          in: path
          description: The unique UUID representing the file
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: A file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      operationId: UpdateFile
      summary: Rename a file
      parameters:
        - name: file_id
          in: path
          description: The unique UUID representing the file to update
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFileRequest'
      responses:
        '200':
          description: Updated file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: DeleteFile
      summary: Delete a file by ID
      parameters:
        - name: file_id
          in: path
          description: The unique UUID representing the file to delete
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: File successfully queued for deletion
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /files/{file_id}/grants:
    post:
      operationId: CreateGrant
      summary: Grant a permission on a file
      parameters:
        - name: file_id
          in: path
          description: The unique UUID of the file to grant access to
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGrantRequest'
      responses:
        '201':
          description: Grant created (or already existed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: RevokeGrant
      summary: Revoke a permission on a file
      parameters:
        - name: file_id
          in: path
          description: The unique UUID of the file to revoke access from
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeGrantRequest'
      responses:
        '204':
          description: Grant revoked (or did not exist)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /schools:
    get:
      operationId: ListSchools
      summary: List and search schools
      parameters:
        - name: q
          in: query
          description: Search term, partial match against school name (trigram) or exact match against acronym (case-insensitive)
          schema:
            type: string
            maxLength: 200
        - name: page_limit
          in: query
          description: Maximum number of schools to return per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: cursor
          in: query
          description: Opaque pagination cursor token obtained from the previous response
          schema:
            type: string
      responses:
        '200':
          description: A paginated list of schools
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSchoolsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /schools/{school_id}:
    get:
      operationId: GetSchool
      summary: Get a single school by ID
      parameters:
        - name: school_id
          in: path
          description: The unique UUID of the school
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The requested school
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /courses:
    get:
      operationId: ListCourses
      summary: List and search courses
      parameters:
        - name: school_id
          in: query
          description: Filter by school UUID
          schema:
            type: string
            format: uuid
        - name: department
          in: query
          description: Exact department code match (case-insensitive, e.g. "CPTS")
          schema:
            type: string
            maxLength: 20
        - name: q
          in: query
          description: Search term, matches against title (trigram), department, or number (case-insensitive)
          schema:
            type: string
            maxLength: 200
        - name: sort_by
          in: query
          description: Database column to sort the results by
          schema:
            type: string
            enum: [department, number, title, created_at]
            default: department
        - name: sort_dir
          in: query
          description: Sorting direction (ascending or descending)
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: page_limit
          in: query
          description: Maximum number of courses to return per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: cursor
          in: query
          description: Opaque pagination cursor token obtained from the previous response
          schema:
            type: string
      responses:
        '200':
          description: A paginated list of courses with embedded school summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCoursesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /courses/{course_id}:
    get:
      operationId: GetCourse
      summary: Get a course detail with embedded sections
      parameters:
        - name: course_id
          in: path
          description: The unique UUID of the course
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The requested course with embedded school summary and sections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /study-guides/{study_guide_id}:
    get:
      operationId: GetStudyGuide
      summary: Get a study guide detail
      description: |
        Returns the full study-guide detail including `content`, the
        authenticated user's own vote state (`user_vote`), the list of
        recommenders, inline quizzes (with `question_count`), resources,
        and attached files. Soft-deleted guides return 404.

        This endpoint is a pure read -- no view-counter increment, no
        last-viewed upsert, no mutation of any kind. View tracking lives
        on its own dedicated POST (future ticket, mirroring
        POST /api/files/{file_id}/view in ASK-134) so GET stays safe
        and idempotent per HTTP semantics.
      parameters:
        - name: study_guide_id
          in: path
          description: The unique UUID of the study guide
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The requested study guide with all nested detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGuideDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      operationId: UpdateStudyGuide
      summary: Update a study guide
      description: |
        Partial update of any subset of `title`, `description`, `content`,
        or `tags`. Only fields provided in the request body are touched;
        absent fields preserve their current values. Tags, when provided,
        are REPLACED entirely (no merge) and normalized server-side
        (trim + lowercase + dedupe).

        Creator-only: 403 if the viewer is not the guide's creator. 404
        for missing or already-deleted guides. Order of checks:
          1. Validate the request body (per-field caps + at-least-one
             field provided).
          2. Fetch + lock guide row.
          3. 404 if missing or deleted_at IS NOT NULL.
          4. 403 if creator_id != viewer_id.
          5. UPDATE only the provided fields, set updated_at = now(),
             COMMIT.
          6. Re-hydrate the full StudyGuideDetail (same shape as GET).
      parameters:
        - name: study_guide_id
          in: path
          description: The unique UUID of the study guide to update
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStudyGuideRequest'
      responses:
        '200':
          description: The updated study guide.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGuideDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: DeleteStudyGuide
      summary: Soft-delete a study guide
      description: |
        Soft-deletes the guide (`study_guides.deleted_at = now()`) and
        cascades to all child quizzes (`quizzes.deleted_at = now()`)
        atomically in a single transaction. Application-level cascade
        (not DB CASCADE) so quizzes keep their own deleted_at lifecycle
        for any future undelete workflow.

        Creator-only: 403 if the viewer is not the guide's creator. 404
        for missing or already-deleted guides. Order of checks:
          1. Fetch + lock guide row.
          2. 404 if missing or deleted_at IS NOT NULL.
          3. 403 if creator_id != viewer_id.
          4. UPDATE guide + child quizzes, COMMIT.
      parameters:
        - name: study_guide_id
          in: path
          description: The unique UUID of the study guide to delete
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Guide soft-deleted; no response body
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /study-guides/{study_guide_id}/resources:
    post:
      operationId: AttachResource
      summary: Attach an external resource to a study guide
      description: |
        Attaches a URL-based resource (link / video / article / pdf) to
        a study guide. Resources are community-contributed -- any
        authenticated user can attach.

        Resource reuse: a (creator_id, url) pair is unique in the
        `resources` table. If the viewer has previously created a
        resource row with the same URL (for any guide), the existing
        row is reused via INSERT ... ON CONFLICT DO NOTHING + lookup;
        the original title / description / type are preserved.

        Conflict detection: if ANY resource (regardless of creator)
        with the same URL is already attached to this guide, returns
        409 BEFORE the upsert -- avoids creating new resource rows
        only to discard them on the join PK violation.

        Returns 201 with the (possibly-reused) resource row.
      parameters:
        - name: study_guide_id
          in: path
          description: The unique UUID of the study guide
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachResourceRequest'
      responses:
        '201':
          description: Resource attached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /study-guides/{study_guide_id}/resources/{resource_id}:
    delete:
      operationId: DetachResource
      summary: Detach a resource from a study guide
      description: |
        Removes the link between a resource and a guide. Does NOT
        delete the resource itself -- a resource may be attached to
        multiple guides + courses.

        Authorization: the guide's creator OR the user who attached
        the resource (`attached_by` on the join row) can detach. The
        resource's own creator (if different from both) cannot detach
        when they didn't attach it here.

        404 covers both 'guide missing/deleted' and 'resource not
        attached to this guide'.
      parameters:
        - name: study_guide_id
          in: path
          description: The unique UUID of the study guide
          required: true
          schema:
            type: string
            format: uuid
        - name: resource_id
          in: path
          description: The unique UUID of the resource to detach
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Resource detached; no response body.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /study-guides/{study_guide_id}/files/{file_id}:
    post:
      operationId: AttachFile
      summary: Attach a file to a study guide
      description: |
        Links an already-uploaded file to a study guide. The file must
        be owned by the viewer (`files.user_id == JWT viewer`) and in
        `status = 'complete'` with no deletion in progress.

        Authorization: only the file owner can attach. A user who does
        not own the file gets 403 (regardless of whether they own the
        guide -- the rule is "you can only put your own files on
        guides", to prevent linking other users' private uploads).

        409 on duplicate -- the same `(file_id, study_guide_id)` pair
        is already attached.
      parameters:
        - name: study_guide_id
          in: path
          description: The unique UUID of the study guide
          required: true
          schema:
            type: string
            format: uuid
        - name: file_id
          in: path
          description: The unique UUID of the file
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: File attached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileAttachmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: DetachFile
      summary: Detach a file from a study guide
      description: |
        Removes the link between a file and a guide. Does NOT delete
        the file itself -- a file may be attached to many guides /
        courses.

        Dual-authz: viewer must be EITHER the file owner OR the
        study guide creator. Broader than POST (which requires file
        owner only) so a guide creator can curate their guide's
        attached files without owning every file.

        404 covers both 'guide missing/deleted' and 'file not
        attached to this guide'.
      parameters:
        - name: study_guide_id
          in: path
          description: The unique UUID of the study guide
          required: true
          schema:
            type: string
            format: uuid
        - name: file_id
          in: path
          description: The unique UUID of the file to detach
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: File detached; no response body.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /study-guides/{study_guide_id}/quizzes:
    get:
      operationId: ListQuizzes
      summary: List quizzes attached to a study guide
      description: |
        Returns every non-soft-deleted quiz attached to the given study
        guide, with the creator (privacy floor: id + first_name +
        last_name only) and a server-computed `question_count`. Quizzes
        are ordered by `created_at DESC` (newest first), with `id` as
        the deterministic tiebreaker on identical timestamps.

        No pagination -- per the PRD, study guides typically host a
        handful of quizzes (<10) and the practice page renders them all
        in one go. Non-deleted-only by construction (no `include_deleted`
        toggle); a soft-deleted quiz never surfaces.

        Returns 404 when the study guide does not exist OR is itself
        soft-deleted, mirroring the studyguides surface convention.
      parameters:
        - name: study_guide_id
          in: path
          description: The unique UUID of the study guide whose quizzes to list
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: A list of quizzes attached to the study guide.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListQuizzesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: CreateQuiz
      summary: Create a quiz attached to a study guide
      description: |
        Creates a new quiz with all of its questions and answer options
        in a single atomic request. The frontend quiz builder submits the
        entire quiz at once: if any question fails validation, nothing is
        created (the entire write runs in one transaction).

        Authorization: any authenticated user can create a quiz on any
        study guide. AskAtlas explicitly encourages collaborative quiz
        contribution; ownership of the underlying guide is not required.
        `creator_id` is set from the JWT and any value supplied in the
        body is ignored.

        Per-question validation:
          * `multiple-choice` -- 2-10 options. Each option has `text`
            (1-500 chars) and `is_correct` (boolean). Exactly one option
            must have `is_correct: true`. The request's `correct_answer`
            field is ignored on MCQ.
          * `true-false` -- `correct_answer` MUST be a boolean. The API
            internally creates two `quiz_answer_options` rows (`True`
            and `False`) with the matching `is_correct` flag.
          * `freeform` -- `correct_answer` MUST be a non-empty string
            (max 500 chars). Stored as `quiz_questions.reference_answer`.
            No `quiz_answer_options` rows are created.

        The response mirrors GET /quizzes/{quiz_id} (future ticket) so
        the frontend can render the freshly-created quiz without a
        follow-up GET.
      parameters:
        - name: study_guide_id
          in: path
          description: The unique UUID of the study guide to attach the quiz to
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuizRequest'
      responses:
        '201':
          description: The freshly-created quiz with all questions and options.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /quizzes/{quiz_id}:
    patch:
      operationId: UpdateQuiz
      summary: Update a quiz's metadata (title and/or description)
      description: |
        Partial-update of the quiz's `title` and/or `description`.
        Question-level edits flow through the per-question endpoints --
        this PATCH only touches the quiz row.

        Authorization: creator-only. The authenticated user MUST be
        `quizzes.creator_id`; any other authenticated user gets 403.

        Field semantics:
          * Both fields are optional. An empty body `{}` is rejected
            with 400 -- at least one field must be provided.
          * `title` MUST be non-empty when provided (after trim) and
            <=500 chars.
          * `description` accepts JSON `null` to explicitly CLEAR
            the existing value, a non-empty string to set the value
            (max 2,000 chars after trim), and a whitespace-only
            string is downgraded to a clear (NULL) since the column
            should not store meaningless blank values. To leave the
            current description untouched, OMIT the field entirely
            from the request body.

        404 covers BOTH the quiz being missing/soft-deleted AND the
        parent study guide being soft-deleted (per spec AC6).
        `updated_at` is refreshed on every successful PATCH.
      parameters:
        - name: quiz_id
          in: path
          description: The unique UUID of the quiz to update
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateQuizRequest'
      responses:
        '200':
          description: The updated quiz with all questions and options.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: DeleteQuiz
      summary: Soft-delete a quiz
      description: |
        Soft-deletes the quiz by setting `deleted_at = now()` (the row
        stays in the table; subsequent reads filter by `deleted_at IS
        NULL` and treat the quiz as gone).

        Authorization: creator-only. The authenticated user MUST be
        `quizzes.creator_id` for the action to proceed; any other
        authenticated user gets 403.

        Idempotency: a second DELETE on an already-soft-deleted quiz
        returns 404 (not 204). This is a deliberate choice -- a
        duplicate DELETE that returned 204 would silently confirm a
        destructive action and mask the "is this quiz still here?"
        question the caller is actually asking. The 404 is also the
        same response a non-creator would get for the same row, so
        callers cannot distinguish "quiz was just deleted" from
        "quiz never existed" or "you can't see this quiz" -- the
        information-leak prevention covered by the unit tests.

        No cascade: practice sessions, questions, and answer options
        are NOT touched. The quiz simply becomes invisible to the
        list/detail endpoints. This preserves historical data for
        completed sessions and matches the spec's "preserve practice
        history" requirement.
      parameters:
        - name: quiz_id
          in: path
          description: The unique UUID of the quiz to soft-delete
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Quiz soft-deleted; no response body.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /quizzes/{quiz_id}/questions:
    post:
      operationId: AddQuizQuestion
      summary: Add a question to an existing quiz
      description: |
        Appends a single question (with its answer options for MCQ, or
        the auto-expanded True/False option pair for TF) to an
        existing quiz. The validation rules are identical to the
        per-question rules on POST /api/study-guides/{id}/quizzes --
        same `type` enum, same per-type `correct_answer` typing, same
        MCQ option counts and "exactly one correct" invariant.

        Authorization: creator-only. The authenticated user MUST be
        `quizzes.creator_id`; any other authenticated user gets 403.

        Per-quiz cap: a quiz can hold at most 100 questions. The
        count is taken inside the same transaction as the insert so
        a concurrent add cannot push the quiz over the cap.

        `quizzes.updated_at` is refreshed on every successful add.
        Active practice sessions are NOT affected -- the new
        question is not retro-injected into existing
        `practice_session_questions` snapshots; only sessions started
        after the add will include it.

        404 covers BOTH the quiz being missing/soft-deleted AND the
        parent study guide being soft-deleted (same convention as
        PATCH /quizzes/{quiz_id}).

        Default `sort_order`: when omitted, defaults to the current
        question count (so the new question lands at the end of the
        existing sequence). An explicit value is honored verbatim --
        callers may interleave with existing questions if they want.
      parameters:
        - name: quiz_id
          in: path
          description: The unique UUID of the quiz to add a question to
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuizQuestion'
      responses:
        '201':
          description: The freshly-created question with its options and resolved correct answer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizQuestionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /study-guides/{study_guide_id}/recommendations:
    post:
      operationId: RecommendStudyGuide
      summary: Recommend a study guide
      description: |
        Records that the authenticated user (an instructor or TA in the
        guide's course) recommends the guide. Recommendations contribute
        to the `is_recommended` badge and the `recommended_by` list on
        the guide detail.

        Authorization: viewer must hold the `instructor` or `ta` role in
        AT LEAST ONE section of the guide's course. Holding a
        non-elevated role (`student`) in some sections does NOT block
        the action -- the rule is "any elevated role somewhere in the
        course suffices".

        Returns 409 on duplicate (same viewer recommended this guide
        before) -- recommendations are not idempotent because the
        creation timestamp matters and re-recommending would silently
        bump it.
      parameters:
        - name: study_guide_id
          in: path
          description: The unique UUID of the study guide to recommend
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Recommendation recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: RemoveStudyGuideRecommendation
      summary: Remove the authenticated user's recommendation on a study guide
      description: |
        Hard-deletes the (viewer, guide) row in
        `study_guide_recommendations`. Authorization mirrors the POST
        side: viewer must currently hold instructor/TA in the guide's
        course (a former TA who lost the role can't manage their old
        recommendations -- the policy is "current elevated-role users
        only").

        404 covers BOTH "guide missing/deleted" and "viewer never
        recommended this guide" -- by design, since the desired end
        state is "no recommendation from viewer", which is reached in
        either case from the caller's point of view.
      parameters:
        - name: study_guide_id
          in: path
          description: The unique UUID of the study guide
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Recommendation removed; no response body.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /study-guides/{study_guide_id}/votes:
    post:
      operationId: CastStudyGuideVote
      summary: Cast or change a vote on a study guide
      description: |
        Upserts the authenticated user's vote on the guide. Same-direction
        re-submits are no-ops; opposite-direction submits flip the vote.
        Returns the post-upsert `vote_score` so the UI can update without
        a refetch. Soft-deleted guides return 404. Creators may vote on
        their own guides (no self-vote restriction).
      parameters:
        - name: study_guide_id
          in: path
          description: The unique UUID of the study guide to vote on
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CastVoteRequest'
      responses:
        '200':
          description: Vote applied; returns the resulting state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CastVoteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: RemoveStudyGuideVote
      summary: Remove the authenticated user's vote on a study guide
      description: |
        Hard-deletes the row in `study_guide_votes` for the
        (viewer, guide) pair, returning the user to a neutral state.
        Returns 404 when the guide is missing/soft-deleted OR when the
        viewer has no existing vote -- both surfaces are collapsed to
        404 by design (the desired state is "no vote", which is reached
        in either case from the caller's point of view).
      parameters:
        - name: study_guide_id
          in: path
          description: The unique UUID of the study guide to remove the vote from
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Vote removed; no response body.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /courses/{course_id}/study-guides:
    get:
      operationId: ListStudyGuides
      summary: List study guides for a course
      description: |
        Returns the study guides for the given course as a paginated
        list. Soft-deleted guides and guides whose creator has been
        soft-deleted are excluded. Per-row aggregates (`vote_score`,
        `is_recommended`, `quiz_count`) are computed inline. The full
        `content` field is intentionally omitted -- it is only returned
        by the get-by-id endpoint, keeping the list payload small.
      parameters:
        - name: course_id
          in: path
          description: The unique UUID of the course
          required: true
          schema:
            type: string
            format: uuid
        - name: q
          in: query
          description: Case-insensitive partial match against title and tags
          required: false
          schema:
            type: string
            maxLength: 200
        - name: tag
          in: query
          description: |
            Filter by exact tag (case-sensitive). Repeatable; multiple
            values are AND-matched (a guide must carry every supplied
            tag to be returned).
          required: false
          schema:
            type: array
            items:
              type: string
              maxLength: 50
          style: form
          explode: true
        - name: sort_by
          in: query
          description: Sort field
          required: false
          schema:
            type: string
            enum:
              - score
              - views
              - newest
              - updated
            default: score
        - name: sort_dir
          in: query
          description: Sort direction
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
        - name: page_limit
          in: query
          description: Maximum number of guides per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: cursor
          in: query
          description: Opaque keyset cursor token from the previous page
          required: false
          schema:
            type: string
      responses:
        '200':
          description: A paginated list of study guides for the course
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListStudyGuidesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: CreateStudyGuide
      summary: Create a study guide for a course
      description: |
        Creates a new study guide. Any authenticated user can create a
        guide for any course. The `creator_id` is taken from the JWT;
        any value supplied in the request body is ignored.

        Tags are normalized server-side: each value is trimmed +
        lowercased + deduplicated (case-insensitively). Empty tags
        after trim are rejected with 400. Validation order on tags:
        per-tag length cap first (50 chars), total count cap second
        (20 tags), then normalize.

        Returns the full StudyGuideDetail shape on 201 -- empty
        recommended_by/quizzes/resources/files arrays, vote_score=0,
        view_count=0, user_vote=null, is_recommended=false. The
        frontend can render the freshly-created guide without a
        follow-up GET.
      parameters:
        - name: course_id
          in: path
          description: The unique UUID of the parent course
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStudyGuideRequest'
      responses:
        '201':
          description: The freshly-created study guide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGuideDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /courses/{course_id}/sections/{section_id}/members:
    get:
      operationId: ListSectionMembers
      summary: List the members of a course section
      description: |
        Returns the section roster with limited per-user info: user_id,
        first_name, last_name, role, joined_at. Email and clerk_id are
        intentionally NOT exposed -- this endpoint is reachable by any
        authenticated user (course pages are public within the app), so
        the payload is the privacy-floor for member identity.

        Sorted by `joined_at ASC` with a `(joined_at, user_id)` keyset
        cursor as the tiebreaker for stable pagination across pages.
      parameters:
        - name: course_id
          in: path
          description: The unique UUID of the parent course
          required: true
          schema:
            type: string
            format: uuid
        - name: section_id
          in: path
          description: The unique UUID of the section
          required: true
          schema:
            type: string
            format: uuid
        - name: role
          in: query
          description: Filter to members with a specific role
          required: false
          schema:
            type: string
            enum:
              - student
              - ta
              - instructor
        - name: limit
          in: query
          description: Maximum number of members to return per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: cursor
          in: query
          description: Opaque keyset cursor token from the previous page
          required: false
          schema:
            type: string
      responses:
        '200':
          description: A paginated list of section members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSectionMembersResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: JoinSection
      summary: Join a section as the authenticated user
      description: |
        Adds the authenticated user as a `student` member of the given section.
        The role is hardcoded to `student` regardless of any fields supplied in
        the request body. `instructor` and `ta` roles are assigned only through
        the seeding pipeline.
      parameters:
        - name: course_id
          in: path
          description: The unique UUID of the parent course
          required: true
          schema:
            type: string
            format: uuid
        - name: section_id
          in: path
          description: The unique UUID of the section to join
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Membership created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseMemberResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /me/courses:
    get:
      operationId: ListMyEnrollments
      summary: List the authenticated user's section enrollments
      description: |
        Returns every section the authenticated user is enrolled in, with
        compact embedded course + school summaries. Sorted by `term DESC,
        department ASC, number ASC`. Not paginated -- a user is typically
        in 4-8 courses, and even outliers fit comfortably in one response.
      parameters:
        - name: term
          in: query
          description: Exact-match term filter (e.g. "Spring 2026")
          required: false
          schema:
            type: string
            maxLength: 30
        - name: role
          in: query
          description: Filter to a specific course-member role
          required: false
          schema:
            type: string
            enum:
              - student
              - ta
              - instructor
      responses:
        '200':
          description: All enrollments matching the supplied filters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMyEnrollmentsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /courses/{course_id}/sections/{section_id}/members/me:
    get:
      operationId: CheckMembership
      summary: Check the authenticated user's membership in a section
      description: |
        Powers the per-section Join/Leave button on the course detail
        page. Always returns 200 -- non-membership is `enrolled: false`
        with null role/joined_at, NOT 404, so the frontend can
        distinguish "not enrolled" from "section does not exist".
      parameters:
        - name: course_id
          in: path
          description: The unique UUID of the parent course
          required: true
          schema:
            type: string
            format: uuid
        - name: section_id
          in: path
          description: The unique UUID of the section to check
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Membership status for the authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipCheckResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: LeaveSection
      summary: Leave a section as the authenticated user
      description: |
        Removes the authenticated user's membership from the given section.
        The membership row is hard-deleted. Any role (`student`, `ta`,
        `instructor`) can leave.
      parameters:
        - name: course_id
          in: path
          description: The unique UUID of the parent course
          required: true
          schema:
            type: string
            format: uuid
        - name: section_id
          in: path
          description: The unique UUID of the section to leave
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Membership removed; no response body
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    FileResponse:
      type: object
      description: Complete metadata payload describing an uploaded file
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        size:
          type: integer
          format: int64
        mime_type:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        favorited_at:
          type: string
          format: date-time
          nullable: true
        last_viewed_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - size
        - mime_type
        - status
        - created_at
        - updated_at
    CreateFileRequest:
      type: object
      description: Payload to create a new file reference
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        mime_type:
          type: string
          enum:
            - "image/jpeg"
            - "image/png"
            - "image/webp"
            - "application/pdf"
            - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            - "application/vnd.openxmlformats-officedocument.presentationml.presentation"
            - "text/plain"
            - "application/epub+zip"
        size:
          type: integer
          format: int64
          minimum: 1
          maximum: 104857600
      required:
        - name
        - mime_type
        - size
    CreateFileResponse:
      type: object
      description: Created file reference with a presigned upload URL
      properties:
        file:
          $ref: '#/components/schemas/FileResponse'
        upload_url:
          type: string
      required:
        - file
        - upload_url
    UpdateFileRequest:
      type: object
      description: Request body for updating file metadata
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
      required:
        - name
    ListFilesResponse:
      type: object
      description: A paginated collection of files
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileResponse'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
      required:
        - files
        - has_more
    CreateGrantRequest:
      type: object
      description: Request body for creating a file grant
      properties:
        grantee_type:
          type: string
          enum: [user, course, study_guide]
        grantee_id:
          type: string
          format: uuid
        permission:
          type: string
          enum: [view, share, delete]
      required:
        - grantee_type
        - grantee_id
        - permission
    RevokeGrantRequest:
      type: object
      description: Request body for revoking a file grant
      properties:
        grantee_type:
          type: string
          enum: [user, course, study_guide]
        grantee_id:
          type: string
          format: uuid
        permission:
          type: string
          enum: [view, share, delete]
      required:
        - grantee_type
        - grantee_id
        - permission
    GrantResponse:
      type: object
      description: A file permission grant
      properties:
        id:
          type: string
          format: uuid
        file_id:
          type: string
          format: uuid
        grantee_type:
          type: string
        grantee_id:
          type: string
          format: uuid
        permission:
          type: string
        granted_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
      required:
        - id
        - file_id
        - grantee_type
        - grantee_id
        - permission
        - granted_by
        - created_at
    SchoolResponse:
      type: object
      description: A school (university or college)
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        acronym:
          type: string
        domain:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          maxLength: 2
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - acronym
        - created_at
    ListSchoolsResponse:
      type: object
      description: A paginated collection of schools
      properties:
        schools:
          type: array
          items:
            $ref: '#/components/schemas/SchoolResponse'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
      required:
        - schools
        - has_more
    SchoolSummary:
      type: object
      description: Compact school payload embedded inside other resources (courses, study guides)
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        acronym:
          type: string
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          maxLength: 2
          nullable: true
      required:
        - id
        - name
        - acronym
    CourseResponse:
      type: object
      description: A course (e.g. CPTS 322) with its school summary embedded
      properties:
        id:
          type: string
          format: uuid
        school:
          $ref: '#/components/schemas/SchoolSummary'
        department:
          type: string
        number:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - school
        - department
        - number
        - title
        - created_at
    SectionSummary:
      type: object
      description: A section of a course (term + instructor + roster size)
      properties:
        id:
          type: string
          format: uuid
        term:
          type: string
        section_code:
          type: string
          nullable: true
        instructor_name:
          type: string
          nullable: true
        member_count:
          type: integer
          format: int64
          minimum: 0
      required:
        - id
        - term
        - member_count
    CourseDetailResponse:
      type: object
      description: A course with its school summary and the full list of sections
      properties:
        id:
          type: string
          format: uuid
        school:
          $ref: '#/components/schemas/SchoolSummary'
        department:
          type: string
        number:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        sections:
          type: array
          items:
            $ref: '#/components/schemas/SectionSummary'
      required:
        - id
        - school
        - department
        - number
        - title
        - created_at
        - sections
    ListCoursesResponse:
      type: object
      description: A paginated collection of courses
      properties:
        courses:
          type: array
          items:
            $ref: '#/components/schemas/CourseResponse'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
      required:
        - courses
        - has_more
    CourseMemberResponse:
      type: object
      description: A user's membership in a course section
      properties:
        user_id:
          type: string
          format: uuid
        section_id:
          type: string
          format: uuid
        role:
          type: string
          enum:
            - student
            - ta
            - instructor
        joined_at:
          type: string
          format: date-time
      required:
        - user_id
        - section_id
        - role
        - joined_at
    EnrollmentSectionSummary:
      type: object
      description: Compact section payload embedded in an EnrollmentResponse
      properties:
        id:
          type: string
          format: uuid
        term:
          type: string
        section_code:
          type: string
          nullable: true
        instructor_name:
          type: string
          nullable: true
      required:
        - id
        - term
    EnrollmentCourseSummary:
      type: object
      description: Compact course payload embedded in an EnrollmentResponse
      properties:
        id:
          type: string
          format: uuid
        department:
          type: string
        number:
          type: string
        title:
          type: string
      required:
        - id
        - department
        - number
        - title
    EnrollmentSchoolSummary:
      type: object
      description: |
        Compact school payload embedded in an EnrollmentResponse. Only id +
        acronym -- the full school summary is available via the course
        detail endpoint and would bloat the dashboard payload.
      properties:
        id:
          type: string
          format: uuid
        acronym:
          type: string
      required:
        - id
        - acronym
    EnrollmentResponse:
      type: object
      description: A single enrollment with embedded section, course, and school
      properties:
        section:
          $ref: '#/components/schemas/EnrollmentSectionSummary'
        course:
          $ref: '#/components/schemas/EnrollmentCourseSummary'
        school:
          $ref: '#/components/schemas/EnrollmentSchoolSummary'
        role:
          type: string
          enum:
            - student
            - ta
            - instructor
        joined_at:
          type: string
          format: date-time
      required:
        - section
        - course
        - school
        - role
        - joined_at
    ListMyEnrollmentsResponse:
      type: object
      description: All enrollments for the authenticated user
      properties:
        enrollments:
          type: array
          items:
            $ref: '#/components/schemas/EnrollmentResponse'
      required:
        - enrollments
    SectionMemberResponse:
      type: object
      description: |
        Limited per-user payload returned by ListSectionMembers. Email
        and clerk_id are intentionally NOT exposed -- any authenticated
        user can list members of any section, so this is the privacy
        floor for member identity.
      properties:
        user_id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
          enum:
            - student
            - ta
            - instructor
        joined_at:
          type: string
          format: date-time
      required:
        - user_id
        - first_name
        - last_name
        - role
        - joined_at
    ListSectionMembersResponse:
      type: object
      description: A paginated collection of section members
      properties:
        members:
          type: array
          items:
            $ref: '#/components/schemas/SectionMemberResponse'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
      required:
        - members
        - has_more
    CreatorSummary:
      type: object
      description: |
        Compact user payload used as the `creator` of a study guide. Same
        privacy floor as SectionMemberResponse -- no email, no clerk_id.
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
      required:
        - id
        - first_name
        - last_name
    StudyGuideListItemResponse:
      type: object
      description: |
        A study guide as it appears in the list response. Excludes
        `content` (only returned by the get-by-id endpoint) to keep the
        list payload small. Per-row aggregates (`vote_score`,
        `is_recommended`, `quiz_count`) are computed inline.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        creator:
          $ref: '#/components/schemas/CreatorSummary'
        course_id:
          type: string
          format: uuid
        vote_score:
          type: integer
          format: int64
        view_count:
          type: integer
          format: int64
          minimum: 0
        is_recommended:
          type: boolean
        quiz_count:
          type: integer
          format: int64
          minimum: 0
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - title
        - tags
        - creator
        - course_id
        - vote_score
        - view_count
        - is_recommended
        - quiz_count
        - created_at
        - updated_at
    GuideCourseSummary:
      type: object
      description: |
        Compact course payload embedded in StudyGuideDetailResponse.
        Mirrors EnrollmentCourseSummary but lives here separately so
        the two surfaces can evolve independently.
      properties:
        id:
          type: string
          format: uuid
        department:
          type: string
        number:
          type: string
        title:
          type: string
      required:
        - id
        - department
        - number
        - title
    QuizSummary:
      type: object
      description: |
        Compact quiz payload embedded in StudyGuideDetailResponse.
        Privacy floor: id + title + question_count only. Creator id,
        quiz content, and scoring config are intentionally absent --
        the quiz detail endpoint (future ticket ASK-142) is the source
        of truth for those.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        question_count:
          type: integer
          format: int64
          minimum: 0
      required:
        - id
        - title
        - question_count
    FileAttachmentResponse:
      type: object
      description: |
        Response body for POST /api/study-guides/{study_guide_id}/files/{file_id}.
        Returns the join row's keys + creation timestamp. The file's
        own metadata (name, mime_type, size) is intentionally NOT
        included -- the wire shape mirrors the join table since this
        endpoint only creates the link, not the file. Callers that
        want full file metadata can hit GET /api/study-guides/{id}
        which includes the attached file list with privacy floor.
      properties:
        file_id:
          type: string
          format: uuid
        study_guide_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
      required:
        - file_id
        - study_guide_id
        - created_at
    AttachResourceRequest:
      type: object
      description: |
        Request body for POST /api/study-guides/{study_guide_id}/resources.
        `title` and `url` are required. `type` defaults to `link` when
        omitted. URL must be http or https (validated server-side; the
        openapi `format: uri` only checks general syntax).
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        url:
          type: string
          format: uri
          maxLength: 2000
        type:
          type: string
          enum:
            - link
            - video
            - article
            - pdf
        description:
          type: string
          nullable: true
          maxLength: 1000
      required:
        - title
        - url
    ResourceSummary:
      type: object
      description: |
        Compact resource payload embedded in StudyGuideDetailResponse.
        No creator or uploader info -- the study-guide detail caller
        does not need to know who attached the resource.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        url:
          type: string
        type:
          type: string
          enum:
            - link
            - video
            - article
            - pdf
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - title
        - url
        - type
        - created_at
    StudyGuideFileSummary:
      type: object
      description: |
        Compact file payload embedded in StudyGuideDetailResponse.
        Privacy floor: id + name + mime_type + size only. Owner,
        s3_key, and checksum are intentionally absent.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        mime_type:
          type: string
        size:
          type: integer
          format: int64
          minimum: 0
      required:
        - id
        - name
        - mime_type
        - size
    RecommendationResponse:
      type: object
      description: |
        Response body for POST /api/study-guides/{study_guide_id}/recommendations.
        Returns the freshly-created recommendation row plus the
        recommender's compact identity (same privacy floor as
        CreatorSummary -- no email, no clerk_id).
      properties:
        study_guide_id:
          type: string
          format: uuid
        recommended_by:
          $ref: '#/components/schemas/CreatorSummary'
        created_at:
          type: string
          format: date-time
      required:
        - study_guide_id
        - recommended_by
        - created_at
    CastVoteRequest:
      type: object
      description: |
        Request body for POST /api/study-guides/{study_guide_id}/votes.
        `vote` is the desired direction. Same-direction submits are
        no-ops at the SQL layer (the upsert WHERE clause skips the row
        modification when vote is unchanged).
      properties:
        vote:
          type: string
          enum:
            - up
            - down
      required:
        - vote
    CastVoteResponse:
      type: object
      description: |
        Response body for POST /api/study-guides/{study_guide_id}/votes.
        Returns the post-upsert state so the UI can patch its local
        vote_score without a follow-up GET.
      properties:
        vote:
          type: string
          enum:
            - up
            - down
        vote_score:
          type: integer
          format: int64
      required:
        - vote
        - vote_score
    CreateStudyGuideRequest:
      type: object
      description: |
        Request body for POST /api/courses/{course_id}/study-guides.
        Only `title` is required. Tags are normalized server-side
        (trim + lowercase + dedupe); empty tags after trim are
        rejected with 400. `creator_id` is set from the JWT and
        ignored if supplied here.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
          nullable: true
          maxLength: 2000
        content:
          type: string
          nullable: true
          maxLength: 100000
        tags:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 50
      required:
        - title
    UpdateStudyGuideRequest:
      type: object
      description: |
        Request body for PATCH /api/study-guides/{study_guide_id}.
        All fields are optional; absent fields preserve their current
        value. Tags, when provided, REPLACE all existing tags (no
        merge) and are normalized server-side (trim + lowercase +
        dedupe). At least one field must be provided -- an empty body
        `{}` is rejected with 400.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
          nullable: true
          maxLength: 2000
        content:
          type: string
          nullable: true
          maxLength: 100000
        tags:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 50
    StudyGuideDetailResponse:
      type: object
      description: |
        Full study-guide payload for the detail endpoint. Includes
        content (excluded from the list payload) plus the
        authenticated user's own vote state and the nested
        recommenders / quizzes / resources / files arrays.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        content:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        creator:
          $ref: '#/components/schemas/CreatorSummary'
        course:
          $ref: '#/components/schemas/GuideCourseSummary'
        vote_score:
          type: integer
          format: int64
        user_vote:
          type: string
          nullable: true
          enum:
            - up
            - down
        view_count:
          type: integer
          format: int64
          minimum: 0
        is_recommended:
          type: boolean
        recommended_by:
          type: array
          items:
            $ref: '#/components/schemas/CreatorSummary'
        quizzes:
          type: array
          items:
            $ref: '#/components/schemas/QuizSummary'
        resources:
          type: array
          items:
            $ref: '#/components/schemas/ResourceSummary'
        files:
          type: array
          items:
            $ref: '#/components/schemas/StudyGuideFileSummary'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - title
        - tags
        - creator
        - course
        - vote_score
        - user_vote
        - view_count
        - is_recommended
        - recommended_by
        - quizzes
        - resources
        - files
        - created_at
        - updated_at
    ListStudyGuidesResponse:
      type: object
      description: A paginated collection of study guides for a course
      properties:
        study_guides:
          type: array
          items:
            $ref: '#/components/schemas/StudyGuideListItemResponse'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
      required:
        - study_guides
        - has_more
    MembershipCheckResponse:
      type: object
      description: |
        Per-section membership status for the authenticated user. `enrolled`
        is always present; `role` and `joined_at` are non-null only when
        `enrolled` is true. Both nullable fields are emitted as JSON null
        (not omitted) so the frontend can safely destructure.
      properties:
        enrolled:
          type: boolean
        role:
          type: string
          nullable: true
          enum:
            - student
            - ta
            - instructor
        joined_at:
          type: string
          format: date-time
          nullable: true
      required:
        - enrolled
        - role
        - joined_at
    CreateQuizMCQOption:
      type: object
      description: |
        A single option for a `multiple-choice` question on the create
        request. Exactly one option per MCQ question must have
        `is_correct: true`. The text is rendered to the student
        verbatim; no normalization is applied server-side.
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 500
        is_correct:
          type: boolean
      required:
        - text
        - is_correct
    CreateQuizQuestion:
      type: object
      description: |
        A single question on the create-quiz request. The `type` field
        discriminates which other fields are meaningful:
          * `multiple-choice` -- requires `options`; ignores
            `correct_answer`.
          * `true-false` -- requires `correct_answer` as a boolean;
            ignores `options`.
          * `freeform` -- requires `correct_answer` as a non-empty
            string; ignores `options`.
        Cross-field validation is enforced by the service layer with
        per-field 400 error details when the rules above are violated.
      properties:
        type:
          type: string
          enum:
            - multiple-choice
            - true-false
            - freeform
        question:
          type: string
          minLength: 1
          maxLength: 2000
        options:
          type: array
          minItems: 2
          maxItems: 10
          items:
            $ref: '#/components/schemas/CreateQuizMCQOption'
        correct_answer:
          description: |
            For `true-false` questions this is a boolean; for `freeform`
            questions this is a non-empty string (max 500 chars).
            Ignored for `multiple-choice` questions (correctness is
            embedded in `options[].is_correct`).
          nullable: true
        hint:
          type: string
          nullable: true
          maxLength: 1000
        feedback_correct:
          type: string
          nullable: true
          maxLength: 1000
        feedback_incorrect:
          type: string
          nullable: true
          maxLength: 1000
        sort_order:
          type: integer
          minimum: 0
      required:
        - type
        - question
    CreateQuizRequest:
      type: object
      description: |
        Request body for POST /api/study-guides/{study_guide_id}/quizzes.
        The entire quiz (title + N questions + each question's options)
        is created atomically. If any question fails validation, the
        whole request is rejected and no rows are written.

        `creator_id` is set from the JWT; any value supplied here is
        ignored (sending one is not an error to keep the wire shape
        forgiving for frontend builders).
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
          nullable: true
          maxLength: 2000
        questions:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/CreateQuizQuestion'
      required:
        - title
        - questions
    QuizQuestionResponse:
      type: object
      description: |
        A single question on the quiz detail response. The `options`
        array is present only on `multiple-choice` questions and lists
        the option text in display order. `correct_answer` is the
        text of the correct option for MCQ, the boolean for true-false,
        and the reference answer string for freeform.
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - multiple-choice
            - true-false
            - freeform
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correct_answer:
          description: |
            The correct answer for this question. String for
            multiple-choice (the winning option's text) and freeform
            (the reference answer); boolean for true-false.
          nullable: true
        hint:
          type: string
          nullable: true
        feedback:
          type: object
          properties:
            correct:
              type: string
              nullable: true
            incorrect:
              type: string
              nullable: true
          required:
            - correct
            - incorrect
        sort_order:
          type: integer
      required:
        - id
        - type
        - question
        - hint
        - feedback
        - sort_order
    QuizDetailResponse:
      type: object
      description: |
        Full quiz payload returned by POST /api/study-guides/{id}/quizzes
        (and the future GET /api/quizzes/{quiz_id}). Includes the
        embedded study guide id, the creator (privacy floor: id +
        first_name + last_name only), and every question with its
        options and correct answer.
      properties:
        id:
          type: string
          format: uuid
        study_guide_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        creator:
          $ref: '#/components/schemas/CreatorSummary'
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuizQuestionResponse'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - study_guide_id
        - title
        - description
        - creator
        - questions
        - created_at
        - updated_at
    QuizListItemResponse:
      type: object
      description: |
        Compact quiz payload returned by GET /api/study-guides/{id}/quizzes.
        Richer than QuizSummary (which embeds inside StudyGuideDetailResponse
        and intentionally stays minimal): includes the creator (privacy
        floor: id + first_name + last_name only), description, and
        timestamps so the practice page can render the quiz card without
        a follow-up GET on the quiz detail.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        question_count:
          type: integer
          format: int64
          minimum: 0
        creator:
          $ref: '#/components/schemas/CreatorSummary'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - question_count
        - creator
        - created_at
        - updated_at
    ListQuizzesResponse:
      type: object
      description: |
        A non-paginated collection of quizzes for one study guide. The
        spec deliberately omits pagination -- guides typically host
        fewer than ten quizzes and the practice page renders them all
        in one shot.
      properties:
        quizzes:
          type: array
          items:
            $ref: '#/components/schemas/QuizListItemResponse'
      required:
        - quizzes
    UpdateQuizRequest:
      type: object
      description: |
        Request body for PATCH /api/quizzes/{quiz_id}. Both fields
        are optional; absent fields preserve their current value.
        At least one field must be provided -- an empty body `{}`
        is rejected with 400.

        `description` supports an explicit JSON `null` to clear the
        existing value (the only field on this endpoint with that
        semantic; `title` cannot be cleared because the column is
        NOT NULL on the underlying schema).
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
          nullable: true
          maxLength: 2000
    AppError:
      type: object
      description: Standardized error response structure matching application error domains
      properties:
        code:
          type: integer
        status:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties:
            type: string
      required:
        - code
        - status
        - message
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    Conflict:
      description: Conflict with current resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    InternalServerError:
