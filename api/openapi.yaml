openapi: 3.0.3
info:
  title: AskAtlas API
  version: 1.0.0
servers:
  - url: /api
security:
  - BearerAuth: []
paths:
  /me/files:
    get:
      operationId: ListFiles
      summary: List files for the current user
      parameters:
        - name: scope
          in: query
          description: Filter files by ownership or access level
          schema:
            type: string
            enum: [owned, course, study_guide, accessible]
            default: owned
        - name: status
          in: query
          description: Filter files by processing status
          schema:
            type: string
            enum: [pending, complete, failed]
            default: complete
        - name: mime_type
          in: query
          description: Filter by precise document mime-type classification
          schema:
            type: string
            enum:
              - "image/jpeg"
              - "image/png"
              - "image/webp"
              - "application/pdf"
              - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
              - "application/vnd.openxmlformats-officedocument.presentationml.presentation"
              - "text/plain"
              - "application/epub+zip"
        - name: min_size
          in: query
          description: Minimum file size in bytes
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: max_size
          in: query
          description: Maximum file size in bytes
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: created_from
          in: query
          description: Filter for files created on or after this UTC timestamp
          schema:
            type: string
            format: date-time
        - name: created_to
          in: query
          description: Filter for files created on or before this UTC timestamp
          schema:
            type: string
            format: date-time
        - name: updated_from
          in: query
          description: Filter for files updated on or after this UTC timestamp
          schema:
            type: string
            format: date-time
        - name: updated_to
          in: query
          description: Filter for files updated on or before this UTC timestamp
          schema:
            type: string
            format: date-time
        - name: q
          in: query
          description: Search term to partially match against file names
          schema:
            type: string
        - name: sort_by
          in: query
          description: Database column to sort the results by
          schema:
            type: string
            enum: [updated_at, created_at, name, size, status, mime_type]
            default: updated_at
        - name: sort_dir
          in: query
          description: Sorting direction (ascending or descending)
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: page_limit
          in: query
          description: Maximum number of files to return per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: cursor
          in: query
          description: Opaque pagination cursor token obtained from the previous response
          schema:
            type: string
      responses:
        '200':
          description: A list of files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFilesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /files:
    post:
      operationId: CreateFile
      summary: Create a file reference and get a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFileRequest'
      responses:
        '201':
          description: File reference created with presigned upload URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /files/{file_id}:
    get:
      operationId: GetFile
      summary: Get a file by ID
      parameters:
        - name: file_id
          in: path
          description: The unique UUID representing the file
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: A file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      operationId: UpdateFile
      summary: Rename a file
      parameters:
        - name: file_id
          in: path
          description: The unique UUID representing the file to update
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFileRequest'
      responses:
        '200':
          description: Updated file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: DeleteFile
      summary: Delete a file by ID
      parameters:
        - name: file_id
          in: path
          description: The unique UUID representing the file to delete
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: File successfully queued for deletion
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /files/{file_id}/grants:
    post:
      operationId: CreateGrant
      summary: Grant a permission on a file
      parameters:
        - name: file_id
          in: path
          description: The unique UUID of the file to grant access to
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGrantRequest'
      responses:
        '201':
          description: Grant created (or already existed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: RevokeGrant
      summary: Revoke a permission on a file
      parameters:
        - name: file_id
          in: path
          description: The unique UUID of the file to revoke access from
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeGrantRequest'
      responses:
        '204':
          description: Grant revoked (or did not exist)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /schools:
    get:
      operationId: ListSchools
      summary: List and search schools
      parameters:
        - name: q
          in: query
          description: Search term, partial match against school name (trigram) or exact match against acronym (case-insensitive)
          schema:
            type: string
            maxLength: 200
        - name: page_limit
          in: query
          description: Maximum number of schools to return per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: cursor
          in: query
          description: Opaque pagination cursor token obtained from the previous response
          schema:
            type: string
      responses:
        '200':
          description: A paginated list of schools
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSchoolsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    FileResponse:
      type: object
      description: Complete metadata payload describing an uploaded file
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        size:
          type: integer
          format: int64
        mime_type:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        favorited_at:
          type: string
          format: date-time
          nullable: true
        last_viewed_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - size
        - mime_type
        - status
        - created_at
        - updated_at
    CreateFileRequest:
      type: object
      description: Payload to create a new file reference
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        mime_type:
          type: string
          enum:
            - "image/jpeg"
            - "image/png"
            - "image/webp"
            - "application/pdf"
            - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            - "application/vnd.openxmlformats-officedocument.presentationml.presentation"
            - "text/plain"
            - "application/epub+zip"
        size:
          type: integer
          format: int64
          minimum: 1
          maximum: 104857600
      required:
        - name
        - mime_type
        - size
    CreateFileResponse:
      type: object
      description: Created file reference with a presigned upload URL
      properties:
        file:
          $ref: '#/components/schemas/FileResponse'
        upload_url:
          type: string
      required:
        - file
        - upload_url
    UpdateFileRequest:
      type: object
      description: Request body for updating file metadata
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
      required:
        - name
    ListFilesResponse:
      type: object
      description: A paginated collection of files
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileResponse'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
      required:
        - files
        - has_more
    CreateGrantRequest:
      type: object
      description: Request body for creating a file grant
      properties:
        grantee_type:
          type: string
          enum: [user, course, study_guide]
        grantee_id:
          type: string
          format: uuid
        permission:
          type: string
          enum: [view, share, delete]
      required:
        - grantee_type
        - grantee_id
        - permission
    RevokeGrantRequest:
      type: object
      description: Request body for revoking a file grant
      properties:
        grantee_type:
          type: string
          enum: [user, course, study_guide]
        grantee_id:
          type: string
          format: uuid
        permission:
          type: string
          enum: [view, share, delete]
      required:
        - grantee_type
        - grantee_id
        - permission
    GrantResponse:
      type: object
      description: A file permission grant
      properties:
        id:
          type: string
          format: uuid
        file_id:
          type: string
          format: uuid
        grantee_type:
          type: string
        grantee_id:
          type: string
          format: uuid
        permission:
          type: string
        granted_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
      required:
        - id
        - file_id
        - grantee_type
        - grantee_id
        - permission
        - granted_by
        - created_at
    SchoolResponse:
      type: object
      description: A school (university or college)
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        acronym:
          type: string
        domain:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          maxLength: 2
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - acronym
        - created_at
    ListSchoolsResponse:
      type: object
      description: A paginated collection of schools
      properties:
        schools:
          type: array
          items:
            $ref: '#/components/schemas/SchoolResponse'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
      required:
        - schools
        - has_more
    AppError:
      type: object
      description: Standardized error response structure matching application error domains
      properties:
        code:
          type: integer
        status:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties:
            type: string
      required:
        - code
        - status
        - message
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
