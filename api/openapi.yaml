openapi: 3.0.3
info:
  title: AskAtlas API
  version: 1.0.0
servers:
  - url: /api
security:
  - BearerAuth: []
paths:
  /me/files:
    get:
      operationId: ListFiles
      summary: List files for the current user
      parameters:
        - name: scope
          in: query
          description: Filter files by ownership or access level
          schema:
            type: string
            enum: [owned, course, study_guide, accessible]
            default: owned
        - name: status
          in: query
          description: Filter files by processing status
          schema:
            type: string
            enum: [pending, complete, failed]
            default: complete
        - name: mime_type
          in: query
          description: Filter by precise document mime-type classification
          schema:
            type: string
            enum:
              - "image/jpeg"
              - "image/png"
              - "image/webp"
              - "application/pdf"
              - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
              - "application/vnd.openxmlformats-officedocument.presentationml.presentation"
              - "text/plain"
              - "application/epub+zip"
        - name: min_size
          in: query
          description: Minimum file size in bytes
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: max_size
          in: query
          description: Maximum file size in bytes
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: created_from
          in: query
          description: Filter for files created on or after this UTC timestamp
          schema:
            type: string
            format: date-time
        - name: created_to
          in: query
          description: Filter for files created on or before this UTC timestamp
          schema:
            type: string
            format: date-time
        - name: updated_from
          in: query
          description: Filter for files updated on or after this UTC timestamp
          schema:
            type: string
            format: date-time
        - name: updated_to
          in: query
          description: Filter for files updated on or before this UTC timestamp
          schema:
            type: string
            format: date-time
        - name: q
          in: query
          description: Search term to partially match against file names
          schema:
            type: string
        - name: sort_by
          in: query
          description: Database column to sort the results by
          schema:
            type: string
            enum: [updated_at, created_at, name, size, status, mime_type]
            default: updated_at
        - name: sort_dir
          in: query
          description: Sorting direction (ascending or descending)
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: page_limit
          in: query
          description: Maximum number of files to return per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: cursor
          in: query
          description: Opaque pagination cursor token obtained from the previous response
          schema:
            type: string
      responses:
        '200':
          description: A list of files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFilesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /files:
    post:
      operationId: CreateFile
      summary: Create a file reference and get a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFileRequest'
      responses:
        '201':
          description: File reference created with presigned upload URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /files/{file_id}:
    get:
      operationId: GetFile
      summary: Get a file by ID
      parameters:
        - name: file_id
          in: path
          description: The unique UUID representing the file
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: A file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      operationId: UpdateFile
      summary: Rename a file
      parameters:
        - name: file_id
          in: path
          description: The unique UUID representing the file to update
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFileRequest'
      responses:
        '200':
          description: Updated file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: DeleteFile
      summary: Delete a file by ID
      parameters:
        - name: file_id
          in: path
          description: The unique UUID representing the file to delete
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: File successfully queued for deletion
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /files/{file_id}/grants:
    post:
      operationId: CreateGrant
      summary: Grant a permission on a file
      parameters:
        - name: file_id
          in: path
          description: The unique UUID of the file to grant access to
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGrantRequest'
      responses:
        '201':
          description: Grant created (or already existed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: RevokeGrant
      summary: Revoke a permission on a file
      parameters:
        - name: file_id
          in: path
          description: The unique UUID of the file to revoke access from
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeGrantRequest'
      responses:
        '204':
          description: Grant revoked (or did not exist)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /schools:
    get:
      operationId: ListSchools
      summary: List and search schools
      parameters:
        - name: q
          in: query
          description: Search term, partial match against school name (trigram) or exact match against acronym (case-insensitive)
          schema:
            type: string
            maxLength: 200
        - name: page_limit
          in: query
          description: Maximum number of schools to return per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: cursor
          in: query
          description: Opaque pagination cursor token obtained from the previous response
          schema:
            type: string
      responses:
        '200':
          description: A paginated list of schools
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSchoolsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /schools/{school_id}:
    get:
      operationId: GetSchool
      summary: Get a single school by ID
      parameters:
        - name: school_id
          in: path
          description: The unique UUID of the school
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The requested school
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /courses:
    get:
      operationId: ListCourses
      summary: List and search courses
      parameters:
        - name: school_id
          in: query
          description: Filter by school UUID
          schema:
            type: string
            format: uuid
        - name: department
          in: query
          description: Exact department code match (case-insensitive, e.g. "CPTS")
          schema:
            type: string
            maxLength: 20
        - name: q
          in: query
          description: Search term, matches against title (trigram), department, or number (case-insensitive)
          schema:
            type: string
            maxLength: 200
        - name: sort_by
          in: query
          description: Database column to sort the results by
          schema:
            type: string
            enum: [department, number, title, created_at]
            default: department
        - name: sort_dir
          in: query
          description: Sorting direction (ascending or descending)
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: page_limit
          in: query
          description: Maximum number of courses to return per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: cursor
          in: query
          description: Opaque pagination cursor token obtained from the previous response
          schema:
            type: string
      responses:
        '200':
          description: A paginated list of courses with embedded school summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCoursesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /courses/{course_id}:
    get:
      operationId: GetCourse
      summary: Get a course detail with embedded sections
      parameters:
        - name: course_id
          in: path
          description: The unique UUID of the course
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The requested course with embedded school summary and sections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /courses/{course_id}/sections/{section_id}/members:
    post:
      operationId: JoinSection
      summary: Join a section as the authenticated user
      description: |
        Adds the authenticated user as a `student` member of the given section.
        The role is hardcoded to `student` regardless of any fields supplied in
        the request body. `instructor` and `ta` roles are assigned only through
        the seeding pipeline.
      parameters:
        - name: course_id
          in: path
          description: The unique UUID of the parent course
          required: true
          schema:
            type: string
            format: uuid
        - name: section_id
          in: path
          description: The unique UUID of the section to join
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Membership created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseMemberResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /me/courses:
    get:
      operationId: ListMyEnrollments
      summary: List the authenticated user's section enrollments
      description: |
        Returns every section the authenticated user is enrolled in, with
        compact embedded course + school summaries. Sorted by `term DESC,
        department ASC, number ASC`. Not paginated -- a user is typically
        in 4-8 courses, and even outliers fit comfortably in one response.
      parameters:
        - name: term
          in: query
          description: Exact-match term filter (e.g. "Spring 2026")
          required: false
          schema:
            type: string
            maxLength: 30
        - name: role
          in: query
          description: Filter to a specific course-member role
          required: false
          schema:
            type: string
            enum:
              - student
              - ta
              - instructor
      responses:
        '200':
          description: All enrollments matching the supplied filters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMyEnrollmentsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /courses/{course_id}/sections/{section_id}/members/me:
    get:
      operationId: CheckMembership
      summary: Check the authenticated user's membership in a section
      description: |
        Powers the per-section Join/Leave button on the course detail
        page. Always returns 200 -- non-membership is `enrolled: false`
        with null role/joined_at, NOT 404, so the frontend can
        distinguish "not enrolled" from "section does not exist".
      parameters:
        - name: course_id
          in: path
          description: The unique UUID of the parent course
          required: true
          schema:
            type: string
            format: uuid
        - name: section_id
          in: path
          description: The unique UUID of the section to check
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Membership status for the authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipCheckResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: LeaveSection
      summary: Leave a section as the authenticated user
      description: |
        Removes the authenticated user's membership from the given section.
        The membership row is hard-deleted. Any role (`student`, `ta`,
        `instructor`) can leave.
      parameters:
        - name: course_id
          in: path
          description: The unique UUID of the parent course
          required: true
          schema:
            type: string
            format: uuid
        - name: section_id
          in: path
          description: The unique UUID of the section to leave
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Membership removed; no response body
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    FileResponse:
      type: object
      description: Complete metadata payload describing an uploaded file
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        size:
          type: integer
          format: int64
        mime_type:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        favorited_at:
          type: string
          format: date-time
          nullable: true
        last_viewed_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - size
        - mime_type
        - status
        - created_at
        - updated_at
    CreateFileRequest:
      type: object
      description: Payload to create a new file reference
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        mime_type:
          type: string
          enum:
            - "image/jpeg"
            - "image/png"
            - "image/webp"
            - "application/pdf"
            - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            - "application/vnd.openxmlformats-officedocument.presentationml.presentation"
            - "text/plain"
            - "application/epub+zip"
        size:
          type: integer
          format: int64
          minimum: 1
          maximum: 104857600
      required:
        - name
        - mime_type
        - size
    CreateFileResponse:
      type: object
      description: Created file reference with a presigned upload URL
      properties:
        file:
          $ref: '#/components/schemas/FileResponse'
        upload_url:
          type: string
      required:
        - file
        - upload_url
    UpdateFileRequest:
      type: object
      description: Request body for updating file metadata
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
      required:
        - name
    ListFilesResponse:
      type: object
      description: A paginated collection of files
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileResponse'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
      required:
        - files
        - has_more
    CreateGrantRequest:
      type: object
      description: Request body for creating a file grant
      properties:
        grantee_type:
          type: string
          enum: [user, course, study_guide]
        grantee_id:
          type: string
          format: uuid
        permission:
          type: string
          enum: [view, share, delete]
      required:
        - grantee_type
        - grantee_id
        - permission
    RevokeGrantRequest:
      type: object
      description: Request body for revoking a file grant
      properties:
        grantee_type:
          type: string
          enum: [user, course, study_guide]
        grantee_id:
          type: string
          format: uuid
        permission:
          type: string
          enum: [view, share, delete]
      required:
        - grantee_type
        - grantee_id
        - permission
    GrantResponse:
      type: object
      description: A file permission grant
      properties:
        id:
          type: string
          format: uuid
        file_id:
          type: string
          format: uuid
        grantee_type:
          type: string
        grantee_id:
          type: string
          format: uuid
        permission:
          type: string
        granted_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
      required:
        - id
        - file_id
        - grantee_type
        - grantee_id
        - permission
        - granted_by
        - created_at
    SchoolResponse:
      type: object
      description: A school (university or college)
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        acronym:
          type: string
        domain:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          maxLength: 2
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - acronym
        - created_at
    ListSchoolsResponse:
      type: object
      description: A paginated collection of schools
      properties:
        schools:
          type: array
          items:
            $ref: '#/components/schemas/SchoolResponse'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
      required:
        - schools
        - has_more
    SchoolSummary:
      type: object
      description: Compact school payload embedded inside other resources (courses, study guides)
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        acronym:
          type: string
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          maxLength: 2
          nullable: true
      required:
        - id
        - name
        - acronym
    CourseResponse:
      type: object
      description: A course (e.g. CPTS 322) with its school summary embedded
      properties:
        id:
          type: string
          format: uuid
        school:
          $ref: '#/components/schemas/SchoolSummary'
        department:
          type: string
        number:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - school
        - department
        - number
        - title
        - created_at
    SectionSummary:
      type: object
      description: A section of a course (term + instructor + roster size)
      properties:
        id:
          type: string
          format: uuid
        term:
          type: string
        section_code:
          type: string
          nullable: true
        instructor_name:
          type: string
          nullable: true
        member_count:
          type: integer
          format: int64
          minimum: 0
      required:
        - id
        - term
        - member_count
    CourseDetailResponse:
      type: object
      description: A course with its school summary and the full list of sections
      properties:
        id:
          type: string
          format: uuid
        school:
          $ref: '#/components/schemas/SchoolSummary'
        department:
          type: string
        number:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        sections:
          type: array
          items:
            $ref: '#/components/schemas/SectionSummary'
      required:
        - id
        - school
        - department
        - number
        - title
        - created_at
        - sections
    ListCoursesResponse:
      type: object
      description: A paginated collection of courses
      properties:
        courses:
          type: array
          items:
            $ref: '#/components/schemas/CourseResponse'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
      required:
        - courses
        - has_more
    CourseMemberResponse:
      type: object
      description: A user's membership in a course section
      properties:
        user_id:
          type: string
          format: uuid
        section_id:
          type: string
          format: uuid
        role:
          type: string
          enum:
            - student
            - ta
            - instructor
        joined_at:
          type: string
          format: date-time
      required:
        - user_id
        - section_id
        - role
        - joined_at
    EnrollmentSectionSummary:
      type: object
      description: Compact section payload embedded in an EnrollmentResponse
      properties:
        id:
          type: string
          format: uuid
        term:
          type: string
        section_code:
          type: string
          nullable: true
        instructor_name:
          type: string
          nullable: true
      required:
        - id
        - term
    EnrollmentCourseSummary:
      type: object
      description: Compact course payload embedded in an EnrollmentResponse
      properties:
        id:
          type: string
          format: uuid
        department:
          type: string
        number:
          type: string
        title:
          type: string
      required:
        - id
        - department
        - number
        - title
    EnrollmentSchoolSummary:
      type: object
      description: |
        Compact school payload embedded in an EnrollmentResponse. Only id +
        acronym -- the full school summary is available via the course
        detail endpoint and would bloat the dashboard payload.
      properties:
        id:
          type: string
          format: uuid
        acronym:
          type: string
      required:
        - id
        - acronym
    EnrollmentResponse:
      type: object
      description: A single enrollment with embedded section, course, and school
      properties:
        section:
          $ref: '#/components/schemas/EnrollmentSectionSummary'
        course:
          $ref: '#/components/schemas/EnrollmentCourseSummary'
        school:
          $ref: '#/components/schemas/EnrollmentSchoolSummary'
        role:
          type: string
          enum:
            - student
            - ta
            - instructor
        joined_at:
          type: string
          format: date-time
      required:
        - section
        - course
        - school
        - role
        - joined_at
    ListMyEnrollmentsResponse:
      type: object
      description: All enrollments for the authenticated user
      properties:
        enrollments:
          type: array
          items:
            $ref: '#/components/schemas/EnrollmentResponse'
      required:
        - enrollments
    MembershipCheckResponse:
      type: object
      description: |
        Per-section membership status for the authenticated user. `enrolled`
        is always present; `role` and `joined_at` are non-null only when
        `enrolled` is true. Both nullable fields are emitted as JSON null
        (not omitted) so the frontend can safely destructure.
      properties:
        enrolled:
          type: boolean
        role:
          type: string
          nullable: true
          enum:
            - student
            - ta
            - instructor
        joined_at:
          type: string
          format: date-time
          nullable: true
      required:
        - enrolled
        - role
        - joined_at
    AppError:
      type: object
      description: Standardized error response structure matching application error domains
      properties:
        code:
          type: integer
        status:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties:
            type: string
      required:
        - code
        - status
        - message
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    Conflict:
      description: Conflict with current resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'
