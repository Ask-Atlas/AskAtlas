        id:
          type: string
          format: uuid
        file_id:
          type: string
          format: uuid
        grantee_type:
          type: string
        grantee_id:
          type: string
          format: uuid
        permission:
          type: string
        granted_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
      required:
