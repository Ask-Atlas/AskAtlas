name: Web Application Deployments

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
        - dev
        - stage
        - prod

# Serialize deploys that target the same VM. Api + web share a host
# per environment, and concurrent `docker pull` invocations race on
# containerd's snapshotter/content store (lchown/rename/lease-not-found).
# Matching group lives in api-deployments.yml so the two workflows
# contend for the same slot per environment.
concurrency:
  group: vm-deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and Push (${{ inputs.environment }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Map environment to Infisical env
        id: infisical-env
        run: |
          declare -A ENV_MAP=( [dev]="dev" [stage]="staging" [prod]="prod" )
          echo "value=${ENV_MAP[${{ inputs.environment }}]}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ask-atlas/web
          tags: |
            type=sha,format=long
            type=raw,value=${{ github.ref_name }}-${{ inputs.environment }}-latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            INFISICAL_MACHINE_CLIENT_ID=${{ secrets.INFISICAL_WEB_CLIENT_ID }}
            INFISICAL_MACHINE_CLIENT_SECRET=${{ secrets.INFISICAL_WEB_CLIENT_SECRET }}
            PROJECT_ID=${{ secrets.INFISICAL_WEB_PROJECT_ID }}
            INFISICAL_SECRET_ENV=${{ steps.infisical-env.outputs.value }}

  deploy:
    name: Deploy to ${{ inputs.environment }}
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Copy deploy script to VM
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "scripts/deploy.sh,scripts/deploy-common.sh"
          target: "/tmp/${{ github.run_id }}"
      
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_WEB_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_WEB_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_WEB_PROJECT_ID }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN,INFISICAL_CLIENT_ID,INFISICAL_CLIENT_SECRET,INFISICAL_PROJECT_ID
          script: |
            set -e
            chmod +x /tmp/${{ github.run_id }}/scripts/deploy.sh /tmp/${{ github.run_id }}/scripts/deploy-common.sh
            /tmp/${{ github.run_id }}/scripts/deploy.sh ${{ inputs.environment }} web ${{ needs.build.outputs.image_tag }}
            rm -rf /tmp/${{ github.run_id }}