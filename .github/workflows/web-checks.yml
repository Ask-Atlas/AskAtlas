name: Web Application Checks

on:
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web-checks.yml'

defaults:
  run:
    working-directory: web

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: 'web/pnpm-lock.yaml'
      - run: make install
      - run: make lint
  formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: 'web/pnpm-lock.yaml'
      - run: make install
      - run: make format-check
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: 'web/pnpm-lock.yaml'
      - run: make install
      - run: make typecheck
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: 'web/pnpm-lock.yaml'
      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical
      - run: make install
      - name: Build with Infisical secrets
        run: |
          INFISICAL_TOKEN=$(infisical login --method=universal-auth \
            --client-id="${{ secrets.INFISICAL_WEB_CLIENT_ID }}" \
            --client-secret="${{ secrets.INFISICAL_WEB_CLIENT_SECRET }}" \
            --plain --silent)
          infisical run --token "$INFISICAL_TOKEN" \
            --projectId "${{ secrets.INFISICAL_WEB_PROJECT_ID }}" \
            --env "dev" \
            -- make build