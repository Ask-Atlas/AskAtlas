name: Web Application Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        type: choice
        options:
        - dev
        - stage
        - prod

jobs:
  rollback:
    name: Rollback ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Copy deploy script to VM
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "scripts/rollback.sh,scripts/deploy-common.sh"
          target: "/tmp/${{ github.run_id }}"
          
      - name: Rollback VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_WEB_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_WEB_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_WEB_PROJECT_ID }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: INFISICAL_CLIENT_ID,INFISICAL_CLIENT_SECRET,INFISICAL_PROJECT_ID
          script: |
            set -e
            chmod +x /tmp/${{ github.run_id }}/scripts/rollback.sh /tmp/${{ github.run_id }}/scripts/deploy-common.sh
            /tmp/${{ github.run_id }}/scripts/rollback.sh ${{ inputs.environment }} web
            rm -rf /tmp/${{ github.run_id }}