name: API Application Checks

on:
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/api-checks.yml"
      - "docs/docusaurus.config.ts"

defaults:
  run:
    working-directory: ./api

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.1"
      - name: Install dependencies
        run: make install
      - name: Lint
        run: make lint

  formatting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.1"
      - name: Install dependencies
        run: make install
      - name: Lint
        run: make format-check
  tidy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.1"
      - name: Install dependencies
        run: make install
      - name: Tidy Check
        run: make tidy-check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.1"
      - name: Install dependencies
        run: make install
      - name: Test
        run: make test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.1"
      - name: Install dependencies
        run: make install
      - name: Build
        run: make build

  generated-api-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.1"
      - name: Generate API Code
        run: make generate-api
      - name: Check for uncommitted generated API code
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated API code is out of sync. Please run 'cd api && make generate-api' locally and commit the changes."
            exit 1
          fi

  openapi-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./docs
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Generate API Documentation
        run: |
          npx docusaurus clean-api-docs all
          npx docusaurus gen-api-docs all
      - name: Check for uncommitted docs
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated docs are out of sync with openapi.yaml. Please run doc generation locally and commit the changes."
            exit 1
          fi
