name: API Application Checks

on:
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/api/checks.yml"

defaults:
  run:
    working-directory: ./api

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.1"
      - name: Install dependencies
        run: make install
      - name: Lint
        run: make lint

  formatting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.1"
      - name: Install dependencies
        run: make install
      - name: Lint
        run: make format-check
  tidy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.1"
      - name: Install dependencies
        run: make install
      - name: Tidy Check
        run: make tidy-check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.1"
      - name: Install dependencies
        run: make install
      - name: Test
        run: make test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.1"
      - name: Install dependencies
        run: make install
      - name: Build
        run: make build